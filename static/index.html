<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100%; }
        body { min-height: 100dvh; overflow: hidden; }
        .app-shell { height: 100vh; height: 100dvh; }
        .chat-container { min-height: 0; }
        .message-bubble {
            max-width: min(85%, 36rem);
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .input-shell { padding-bottom: max(0.5rem, env(safe-area-inset-bottom)); }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        .cursor-blink::after {
            content: '▋';
            animation: blink 1s step-end infinite;
            opacity: 1;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-slate-950 font-sans text-slate-100">
    <div class="app-shell mx-auto flex max-w-2xl flex-col overflow-hidden p-2 sm:p-4">
        <header class="mb-2 flex flex-col gap-3 rounded-xl border border-slate-800 bg-slate-900 p-3 shadow-2xl shadow-black/20 sm:mb-4 sm:flex-row sm:items-center sm:justify-between sm:p-4">
            <div class="min-w-0">
                <h1 class="truncate text-lg font-bold text-white sm:text-xl">AI Hub</h1>
                <p class="truncate text-[10px] font-semibold uppercase tracking-wider text-slate-400 sm:text-xs">Local Model Performance Test</p>
            </div>
            <div class="flex flex-wrap items-center gap-2 sm:justify-end">
                <button id="api-key-btn" class="cursor-pointer whitespace-nowrap rounded-lg border px-3 py-2 text-xs font-semibold transition-all" title="Click to change API key">No Key</button>
                <a href="/admin.html" class="whitespace-nowrap rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-xs font-bold text-slate-200 transition-all hover:bg-slate-700">Admin</a>
                <button id="current-user-badge" class="max-w-[140px] truncate rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-xs font-semibold text-slate-300 transition-all hover:bg-slate-700" title="Click to change user name">Name</button>
                <div class="flex items-center rounded-lg border border-slate-700 bg-slate-800 p-1">
                    <button id="mode-lite" class="text-xs font-bold py-1 px-3 rounded-md transition-all bg-green-500 text-white shadow">Lite ⚡</button>
                    <button id="mode-thinking" class="text-xs font-bold py-1 px-3 rounded-md transition-all text-slate-400 hover:text-slate-200">Thinking</button>
                </div>
                <button id="stream-toggle-btn" class="whitespace-nowrap rounded-lg border border-purple-300 bg-purple-100 px-3 py-2 text-xs font-bold text-purple-700 transition-all" title="Toggle streaming response">⚡ Stream: ON</button>
                <button id="search-toggle-btn" class="whitespace-nowrap rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-xs font-bold text-slate-300 transition-all" title="Toggle web search">🔍 Search: OFF</button>
                <button id="refresh-btn" class="whitespace-nowrap rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-xs font-bold text-slate-200 transition-all hover:bg-slate-700">New Chat</button>
                <div id="connection-status" class="flex items-center whitespace-nowrap text-xs font-medium text-green-500">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span> Connected
                </div>
            </div>
        </header>

        <div id="chat-window" class="chat-container mb-2 flex min-h-0 flex-1 flex-col space-y-3 overflow-y-auto rounded-xl border border-slate-800 bg-slate-900 p-3 shadow-2xl shadow-black/20 sm:mb-4 sm:space-y-4 sm:p-6">
            <div class="self-start rounded-2xl rounded-tl-none border border-slate-700 bg-slate-800 p-4 text-slate-100 shadow-sm message-bubble">
                Hi! I'm running locally. Lite uses fast Gemma E4B by default; Thinking uses Qwen 27B for complex problems. I will remember our conversation.
            </div>
        </div>

        <div class="input-shell shrink-0">
            <div id="image-preview-container" class="mb-2 hidden items-center space-x-2 rounded-xl border border-slate-700 bg-slate-900 p-2">
                <div class="relative">
                    <img id="image-preview" src="" class="h-16 w-16 object-cover rounded-lg border border-slate-700">
                    <button id="remove-image" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md hover:bg-red-600 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <span id="file-name" class="text-xs text-slate-400 truncate max-w-[150px]"></span>
            </div>
            <div class="flex items-center gap-1 rounded-2xl border border-slate-700 bg-slate-900 p-2 shadow-2xl shadow-black/20 sm:gap-2">
                <button id="attach-btn" class="shrink-0 p-2 text-slate-400 transition-all hover:text-blue-400 active:scale-90 sm:p-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </button>
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <input type="text" id="user-input" class="min-w-0 flex-1 bg-transparent px-2 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:outline-none sm:p-4 sm:text-base" placeholder="Ask AI Hub something...">
                <button id="send-btn" class="flex shrink-0 items-center rounded-xl bg-blue-600 px-4 py-2 font-bold text-white shadow-lg transition-all hover:bg-blue-700 active:scale-95 disabled:opacity-50 sm:px-6">Send</button>
            </div>
            <div id="status" class="mt-2 min-h-4 truncate px-2 font-mono text-[10px] text-slate-500"></div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const statusDiv = document.getElementById('status');
        const modeLiteBtn = document.getElementById('mode-lite');
        const modeThinkingBtn = document.getElementById('mode-thinking');
        const attachBtn = document.getElementById('attach-btn');
        const fileInput = document.getElementById('file-input');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image');
        const fileNameSpan = document.getElementById('file-name');
        const currentUserBadge = document.getElementById('current-user-badge');
        const apiKeyBtn = document.getElementById('api-key-btn');
        const streamToggleBtn = document.getElementById('stream-toggle-btn');
        const searchToggleBtn = document.getElementById('search-toggle-btn');

        let currentSessionId = localStorage.getItem('sessionId') || null;
        let currentMode = localStorage.getItem('modelMode') || 'lite';
        if (currentMode === 'normal') {
            currentMode = 'thinking';
            localStorage.setItem('modelMode', currentMode);
        }
        let currentUserName = localStorage.getItem('userName') || null;
        let currentApiKey = localStorage.getItem('apiKey') || null;
        let selectedFile = null;
        let searchEnabled = false;
        let streamEnabled = true;

        function setStreamEnabled(enabled) {
            streamEnabled = enabled;
            if (streamEnabled) {
                streamToggleBtn.textContent = '⚡ Stream: ON';
                streamToggleBtn.className = 'whitespace-nowrap rounded-lg border border-purple-300 bg-purple-100 px-3 py-2 text-xs font-bold text-purple-700 transition-all';
            } else {
                streamToggleBtn.textContent = '⚡ Stream: OFF';
                streamToggleBtn.className = 'whitespace-nowrap rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-xs font-bold text-slate-300 transition-all';
            }
        }

        // ── Stream toggle ──────────────────────────────────────────────
        streamToggleBtn.addEventListener('click', () => {
            setStreamEnabled(!streamEnabled);
        });

        // ── Search toggle ──────────────────────────────────────────────
        searchToggleBtn.addEventListener('click', () => {
            searchEnabled = !searchEnabled;
            if (searchEnabled) {
                searchToggleBtn.textContent = '🔍 Search: ON';
                searchToggleBtn.className = 'whitespace-nowrap rounded-lg border border-green-300 bg-green-100 px-3 py-2 text-xs font-bold text-green-700 transition-all';
                statusDiv.textContent = 'Muốn dùng search thì nhập /search: nội dung cần search';
            } else {
                searchToggleBtn.textContent = '🔍 Search: OFF';
                searchToggleBtn.className = 'whitespace-nowrap rounded-lg border border-slate-700 bg-slate-800 px-3 py-2 text-xs font-bold text-slate-300 transition-all';
            }
        });

        // ── Image helpers ──────────────────────────────────────────────
        function resetSelectedImage() {
            selectedFile = null;
            fileInput.value = '';
            imagePreviewContainer.classList.add('hidden');
            imagePreview.src = '';
            fileNameSpan.textContent = '';
        }

        // ── User / API key badges ──────────────────────────────────────
        function updateCurrentUserBadge() {
            currentUserBadge.textContent = currentUserName ? `User: ${currentUserName}` : 'Name';
        }

        function updateCurrentApiKeyBadge() {
            if (!currentApiKey) {
                apiKeyBtn.textContent = 'Add Key';
                apiKeyBtn.className = 'cursor-pointer whitespace-nowrap rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-xs font-semibold text-red-600 transition-all hover:bg-red-100';
                return;
            }
            apiKeyBtn.textContent = 'Key: ...' + currentApiKey.slice(-4);
            apiKeyBtn.className = 'cursor-pointer whitespace-nowrap rounded-lg border border-green-200 bg-green-50 px-3 py-2 text-xs font-semibold text-green-600 transition-all hover:bg-green-100';
        }

        async function promptForApiKey(defaultValue = currentApiKey || '') {
            const provided = window.prompt('Enter your API key:', defaultValue);
            if (provided === null) return false;
            const trimmed = provided.trim();
            if (!trimmed) { statusDiv.textContent = 'API key is required before chatting'; return false; }
            currentApiKey = trimmed;
            localStorage.setItem('apiKey', currentApiKey);
            updateCurrentApiKeyBadge();
            return true;
        }

        async function ensureApiKey() {
            if (currentApiKey) return true;
            return promptForApiKey('');
        }

        function buildApiHeaders() {
            return { 'Content-Type': 'application/json', 'X-API-KEY': currentApiKey };
        }

        // ── Mode UI ────────────────────────────────────────────────────
        function applyModeUI() {
            const isLite = currentMode === 'lite';
            if (isLite) {
                modeLiteBtn.className = 'text-xs font-bold py-1 px-3 rounded-md transition-all bg-green-500 text-white shadow';
                modeThinkingBtn.className = 'text-xs font-bold py-1 px-3 rounded-md transition-all text-slate-400 hover:text-slate-200';
                attachBtn.disabled = false;
                attachBtn.classList.remove('hidden', 'opacity-40', 'cursor-not-allowed');
            } else {
                modeThinkingBtn.className = 'text-xs font-bold py-1 px-3 rounded-md transition-all bg-blue-600 text-white shadow';
                modeLiteBtn.className = 'text-xs font-bold py-1 px-3 rounded-md transition-all text-slate-400 hover:text-slate-200';
                attachBtn.disabled = true;
                attachBtn.classList.add('opacity-40', 'cursor-not-allowed');
                resetSelectedImage();
            }
        }

        async function switchServerModel(mode) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 120000);
            try {
                const response = await fetch('/v1/admin/model/switch', {
                    method: 'POST',
                    headers: buildApiHeaders(),
                    body: JSON.stringify({ mode }),
                    signal: controller.signal,
                });
                if (!response.ok) {
                    let detail = `Model switch failed (${response.status})`;
                    try {
                        const error = await response.json();
                        detail = typeof error.detail === 'string' ? error.detail : JSON.stringify(error.detail);
                    } catch (_) {}
                    throw new Error(detail);
                }
                return response.json();
            } finally {
                clearTimeout(timeout);
            }
        }

        async function confirmAndSwitchMode(mode) {
            if (currentMode === mode) {
                applyModeUI();
                return;
            }
            if (!await ensureApiKey()) return;
            const isLite = mode === 'lite';
            const label = isLite ? 'Lite Q8' : 'Thinking Qwen 27B';
            const message = isLite
                ? 'Switch back to Lite Q8? The server will switch in the background; wait a moment before chatting.'
                : 'Switch to Thinking Qwen 27B? The server will switch in the background; wait a moment before chatting.';
            if (!window.confirm(message)) return;

            currentMode = mode;
            localStorage.setItem('modelMode', currentMode);
            applyModeUI();
            statusDiv.textContent = `Switching to ${label} in background...`;

            switchServerModel(mode)
                .then((result) => {
                    statusDiv.textContent = `${label} ready: ${(result.models || []).join(', ')}`;
                })
                .catch((error) => {
                    statusDiv.textContent = error.name === 'AbortError'
                        ? `${label} switch is still running. Wait a bit, then refresh if chat does not work.`
                        : `Model switch may still be running. Refresh if chat does not work: ${error.message}`;
                });
        }

        modeLiteBtn.addEventListener('click', () => { confirmAndSwitchMode('lite'); });
        modeThinkingBtn.addEventListener('click', () => { confirmAndSwitchMode('thinking'); });
        apiKeyBtn.addEventListener('click', async () => { if (await promptForApiKey(currentApiKey || '')) statusDiv.textContent = 'API key updated'; });
        currentUserBadge.addEventListener('click', async () => { if (await promptForUserName(currentUserName || '', true)) statusDiv.textContent = `User changed to ${currentUserName}`; });

        // ── Session restore ────────────────────────────────────────────
        async function restoreLatestSessionForUser() {
            if (!currentUserName) { currentSessionId = null; localStorage.removeItem('sessionId'); return; }
            const response = await fetch(`/v1/users/${encodeURIComponent(currentUserName)}/sessions?project_id=test`, { headers: buildApiHeaders() });
            if (!response.ok) throw new Error('Failed to load previous sessions');
            const sessions = await response.json();
            if (sessions.length > 0) {
                currentSessionId = sessions[0].session_id;
                localStorage.setItem('sessionId', currentSessionId);
                statusDiv.textContent = `Resumed latest session for ${currentUserName}`;
                return;
            }
            currentSessionId = null; localStorage.removeItem('sessionId');
            statusDiv.textContent = `Started a fresh session for ${currentUserName}`;
        }

        async function promptForUserName(defaultValue = currentUserName || '', shouldRestoreSession = true) {
            const provided = window.prompt('Enter your name:', defaultValue);
            if (provided === null) return false;
            const trimmed = provided.trim();
            if (!trimmed) { statusDiv.textContent = 'User name is required'; return false; }
            currentUserName = trimmed;
            localStorage.setItem('userName', currentUserName);
            updateCurrentUserBadge();
            if (shouldRestoreSession) await restoreLatestSessionForUser();
            return true;
        }

        async function ensureUserName() {
            if (currentUserName) return true;
            return promptForUserName('', true);
        }

        async function loadExistingMemoryGreeting() {
            if (!currentUserName || !currentApiKey) return null;
            const params = new URLSearchParams({ project_id: 'test', user_name: currentUserName });
            const response = await fetch(`/v1/memory?${params.toString()}`, { headers: buildApiHeaders() });
            if (!response.ok) return null;
            const memory = await response.json();
            const parts = [];
            if (memory.summary?.content) {
                parts.push(`Tóm tắt lần trước của ${currentUserName}:\n${memory.summary.content}`);
            }
            if (Array.isArray(memory.pinned_memories) && memory.pinned_memories.length > 0) {
                const pinned = memory.pinned_memories
                    .slice(0, 5)
                    .map((item) => `- ${item.key}: ${item.value}`)
                    .join('\n');
                parts.push(`Thông tin đã lưu:\n${pinned}`);
            }
            if (parts.length === 0) return null;
            return `${parts.join('\n\n')}\n\nMình đã mở session mới, nhưng vẫn nhớ các thông tin trên nếu bạn muốn tiếp tục.`;
        }

        refreshBtn.addEventListener('click', async () => {
            if (!await ensureApiKey()) return;
            if (!await promptForUserName(currentUserName || '', false)) return;
            currentSessionId = null;
            localStorage.removeItem('sessionId');
            resetSelectedImage();
            chatWindow.innerHTML = '';
            statusDiv.textContent = `Started a new session for ${currentUserName}`;
            try {
                addBubble(await loadExistingMemoryGreeting() || 'New session ready. How can I help you today?', false);
            } catch (_) {
                addBubble('New session ready. How can I help you today?', false);
            }
        });

        // ── File handling ──────────────────────────────────────────────
        attachBtn.addEventListener('click', () => {
            if (currentMode !== 'lite') { statusDiv.textContent = 'Image upload is available only in Lite mode'; return; }
            fileInput.click();
        });
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (currentMode !== 'lite') { resetSelectedImage(); return; }
            if (file && file.type.startsWith('image/')) {
                selectedFile = file;
                fileNameSpan.textContent = file.name;
                const reader = new FileReader();
                reader.onload = (ev) => { imagePreview.src = ev.target.result; imagePreviewContainer.classList.remove('hidden'); };
                reader.readAsDataURL(file);
            }
        });
        removeImageBtn.addEventListener('click', resetSelectedImage);

        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
            });
        }

        // ── Chat bubble helpers ────────────────────────────────────────
        function addBubble(text, isUser = false, images = []) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? 'flex justify-end' : 'flex justify-start';
            const div = document.createElement('div');
            div.className = isUser
                ? 'bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none message-bubble shadow-md'
                : 'border border-slate-700 bg-slate-800 text-slate-100 p-4 rounded-2xl rounded-tl-none message-bubble shadow-sm';
            if (images.length > 0) {
                images.forEach((src) => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = 'max-w-full h-auto rounded-lg mb-2 border border-blue-400';
                    div.appendChild(img);
                });
            }
            const textSpan = document.createElement('span');
            textSpan.textContent = text;
            div.appendChild(textSpan);
            wrapper.appendChild(div);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return textSpan;
        }

        // Create an empty assistant bubble and return its text span (for streaming)
        function createAssistantBubble() {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex justify-start';
            const div = document.createElement('div');
            div.className = 'border border-slate-700 bg-slate-800 text-slate-100 p-4 rounded-2xl rounded-tl-none message-bubble shadow-sm';
            const textSpan = document.createElement('span');
            textSpan.className = 'cursor-blink';
            div.appendChild(textSpan);
            wrapper.appendChild(div);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return textSpan;
        }

        function isSearchCommand(text) {
            return /^\s*\/search(?::|\s+)\s*.+/i.test(text);
        }

        function startsWithSearchCommand(text) {
            return /^\s*\/search\b/i.test(text);
        }

        // ── Streaming send ─────────────────────────────────────────────
        async function sendStreaming(payload) {
            const response = await fetch('/v1/chat', {
                method: 'POST',
                headers: buildApiHeaders(),
                body: JSON.stringify({ ...payload, stream: true }),
            });

            if (!response.ok) {
                let detail = `API error (${response.status})`;
                try { const err = await response.json(); detail = err.detail || detail; } catch (_) {}
                throw new Error(detail);
            }

            const textSpan = createAssistantBubble();
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let sessionId = null;
            let latencyMs = null;

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    // Process complete SSE lines
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // keep incomplete last line

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const raw = line.slice(6).trim();
                        if (raw === '[DONE]') { textSpan.classList.remove('cursor-blink'); return { sessionId, latencyMs }; }

                        let event;
                        try { event = JSON.parse(raw); } catch (_) { continue; }

                        if (event.type === 'start') {
                            sessionId = event.session_id;
                        } else if (event.type === 'chunk') {
                            textSpan.textContent += event.content;
                            chatWindow.scrollTop = chatWindow.scrollHeight;
                        } else if (event.type === 'done') {
                            sessionId = event.session_id;
                            latencyMs = event.latency_ms;
                            textSpan.classList.remove('cursor-blink');
                        } else if (event.type === 'error') {
                            textSpan.classList.remove('cursor-blink');
                            textSpan.textContent = `Error (${event.code}): ${event.detail}`;
                            textSpan.closest('div').className = 'bg-red-50 text-red-700 p-4 rounded-2xl rounded-tl-none message-bubble shadow-sm border border-red-200';
                        }
                    }
                }
            } finally {
                textSpan.classList.remove('cursor-blink');
            }
            return { sessionId, latencyMs };
        }

        // ── Non-streaming send ─────────────────────────────────────────
        async function sendNonStreaming(payload) {
            const response = await fetch('/v1/chat', {
                method: 'POST',
                headers: buildApiHeaders(),
                body: JSON.stringify({ ...payload, stream: false }),
            });
            if (!response.ok) {
                let detail = `API error (${response.status})`;
                try { const err = await response.json(); detail = err.detail || detail; } catch (_) {}
                throw new Error(detail);
            }
            const data = await response.json();
            addBubble(data.content, false);
            return { sessionId: data.session_id, latencyMs: data.latency_ms };
        }

        // ── Main send handler ──────────────────────────────────────────
        async function sendMessage() {
            if (!await ensureApiKey()) { userInput.focus(); return; }
            if (!await ensureUserName()) { userInput.focus(); return; }

            const message = userInput.value.trim();
            if (!message && !selectedFile) return;

            if (!searchEnabled && startsWithSearchCommand(message)) {
                statusDiv.textContent = 'Search đang OFF. Bật Search rồi nhập /search: nội dung cần search';
                addBubble('Search đang OFF. Bật Search rồi gửi lại lệnh /search.', false);
                userInput.focus();
                return;
            }

            let images = [], imagePreviews = [];
            if (selectedFile && currentMode === 'lite') {
                images.push(await fileToBase64(selectedFile));
                imagePreviews.push(imagePreview.src);
                resetSelectedImage();
            }

            userInput.value = '';
            addBubble(message || 'Analyze this image', true, imagePreviews);

            const startTime = performance.now();
            const explicitSearch = searchEnabled && isSearchCommand(message);
            const useStream = streamEnabled && !explicitSearch;
            if (explicitSearch && streamEnabled) {
                setStreamEnabled(false);
                statusDiv.textContent = 'Search sẽ chạy với Stream OFF để ổn định hơn';
            } else if (searchEnabled && !explicitSearch && message) {
                statusDiv.textContent = 'Search đang ON. Muốn dùng search thì nhập /search: nội dung cần search';
            } else {
                statusDiv.innerHTML = useStream
                    ? '<span class="loader mr-2"></span> Streaming response...'
                    : `<span class="loader mr-2"></span> ${currentMode === 'lite' ? 'Gemma E4B' : 'Qwen 27B'} is generating...`;
            }
            sendBtn.disabled = true;

            const payload = {
                project_id: 'test',
                user_name: currentUserName,
                user_message: message || 'Analyze this image',
                session_id: currentSessionId,
                model_mode: currentMode,
                enable_search: searchEnabled,
                allow_external: explicitSearch,
            };
            if (currentMode === 'lite' && images.length > 0) payload.images = images;

            try {
                const { sessionId, latencyMs } = useStream
                    ? await sendStreaming(payload)
                    : await sendNonStreaming(payload);

                if (sessionId) {
                    currentSessionId = sessionId;
                    localStorage.setItem('sessionId', currentSessionId);
                }

                const elapsed = latencyMs != null
                    ? (latencyMs / 1000).toFixed(2)
                    : ((performance.now() - startTime) / 1000).toFixed(2);

                statusDiv.textContent = `LATENCY: ${elapsed}s | SESSION: ${(sessionId || '').substring(0, 8)}... | MODE: ${currentMode.toUpperCase()}${explicitSearch ? ' | SEARCH | STREAM OFF' : ''}${useStream ? ' | STREAMED' : ''}`;
            } catch (error) {
                console.error(error);
                addBubble('Error: ' + error.message, false);
                statusDiv.textContent = 'ERROR: ' + error.message;
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // ── Init ───────────────────────────────────────────────────────
        updateCurrentApiKeyBadge();
        updateCurrentUserBadge();
        applyModeUI();
        if (!currentApiKey) {
            statusDiv.textContent = 'Enter your API key before using the chatbot';
        } else if (!currentUserName) {
            statusDiv.textContent = 'Enter your user name before starting a chat';
        } else {
            restoreLatestSessionForUser().catch((err) => { console.error(err); statusDiv.textContent = 'Failed to restore previous session'; });
        }
        userInput.focus();
    </script>
</body>
</html>
