<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body { height: 100%; }
        body { min-height: 100dvh; overflow: hidden; }
        .app-shell { height: 100vh; height: 100dvh; }
        .chat-container { min-height: 0; }
        .message-bubble {
            max-width: min(85%, 36rem);
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .input-shell { padding-bottom: max(0.5rem, env(safe-area-inset-bottom)); }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        .cursor-blink::after {
            content: '▋';
            animation: blink 1s step-end infinite;
            opacity: 1;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-slate-950 font-sans text-slate-100">
    <div class="app-shell mx-auto flex max-w-2xl flex-col overflow-hidden p-2 sm:p-4">
        <header class="mb-2 flex flex-col gap-2 rounded-xl border border-slate-800 bg-slate-900 p-3 shadow-2xl shadow-black/20 sm:mb-4 sm:gap-3 sm:flex-row sm:items-center sm:justify-between sm:p-4">
            <!-- Brand + connection -->
            <div class="flex items-center justify-between sm:min-w-0">
                <div class="min-w-0">
                    <h1 class="truncate text-base font-bold text-white sm:text-lg">🤖 AI Hub</h1>
                    <div class="flex items-center gap-1.5 text-[10px] text-slate-400 sm:text-xs">
                        <span id="connection-dot" class="w-1.5 h-1.5 rounded-full bg-green-500 shrink-0"></span>
                        <span id="connection-label" class="shrink-0">Local · Gemma 4</span>
                    </div>
                </div>
                <!-- Mobile: compact status row -->
                <div class="flex items-center gap-1.5 sm:hidden">
                    <span id="queue-badge-mobile" class="hidden text-[10px] rounded bg-yellow-800 px-1.5 py-0.5 text-yellow-200">⏳ <span id="queue-active-mobile">0</span>/<span id="queue-cap-mobile">8</span></span>
                    <span id="mode-dot-mobile" class="w-2 h-2 rounded-full bg-green-500" title="Lite mode"></span>
                    <span class="text-[10px] text-slate-500">Lite</span>
                </div>
            </div>

            <!-- Controls — right side -->
            <div class="flex flex-wrap items-center gap-1.5 sm:gap-2">
                <!-- User badge -->
                <button id="current-user-badge" class="group flex items-center gap-1.5 max-w-[120px] truncate rounded-lg border border-slate-700 bg-slate-800 px-2.5 py-1.5 text-xs font-medium text-slate-300 transition-all hover:bg-slate-700 sm:max-w-[140px] sm:px-3 sm:py-2" title="Tap to change name">
                    <span class="text-slate-500 shrink-0">👤</span>
                    <span id="user-name-text" class="truncate">Name</span>
                </button>

                <!-- Project badge -->
                <button id="current-project-badge" class="group flex items-center gap-1.5 max-w-[110px] truncate rounded-lg border border-indigo-700 bg-indigo-900/40 px-2.5 py-1.5 text-xs font-semibold text-indigo-300 transition-all hover:bg-indigo-800/50 sm:max-w-[140px] sm:px-3 sm:py-2" title="Tap to change project">
                    <span class="text-indigo-400 shrink-0">📁</span>
                    <span id="project-name-text" class="truncate">test</span>
                </button>

                <!-- Mode toggle (compact) -->
                <button id="mode-toggle-compact" class="flex items-center gap-1 rounded-lg border border-slate-700 bg-slate-800 px-2.5 py-1.5 text-xs font-semibold text-green-400 transition-all hover:bg-slate-700 sm:hidden" title="Toggle mode">
                    <span id="mode-icon-compact">⚡</span>
                    <span id="mode-label-compact" class="hidden sm:inline">Lite</span>
                </button>

                <!-- Full mode pills (desktop) -->
                <div class="hidden items-center rounded-lg border border-slate-700 bg-slate-800 p-1 sm:flex">
                    <button id="mode-lite" class="text-xs font-bold py-1 px-3 rounded-md transition-all bg-green-500 text-white shadow">⚡ Lite</button>
                    <button id="mode-thinking" class="text-xs font-bold py-1 px-3 rounded-md transition-all text-slate-400 hover:text-slate-200">🧠</button>
                </div>

                <!-- Stream toggle -->
                <button id="stream-toggle-btn" class="flex items-center gap-1 whitespace-nowrap rounded-lg border border-purple-300 bg-purple-100 px-2.5 py-1.5 text-xs font-bold text-purple-700 transition-all sm:px-3 sm:py-2" title="Toggle streaming">
                    <span>⚡</span><span class="hidden sm:inline">Stream</span><span id="stream-state"> ON</span>
                </button>

                <!-- Search toggle -->
                <button id="search-toggle-btn" class="flex items-center gap-1 whitespace-nowrap rounded-lg border border-slate-700 bg-slate-800 px-2.5 py-1.5 text-xs font-bold text-slate-300 transition-all hover:bg-slate-600 sm:px-3 sm:py-2" title="Toggle web search">
                    <span>🔍</span><span class="hidden sm:inline">Search</span><span id="search-state"> OFF</span>
                </button>

                <!-- New chat -->
                <button id="refresh-btn" class="flex items-center gap-1 whitespace-nowrap rounded-lg border border-slate-700 bg-slate-800 px-2.5 py-1.5 text-xs font-bold text-slate-200 transition-all hover:bg-slate-600 sm:px-3 sm:py-2" title="New chat">
                    <span>➕</span><span class="hidden sm:inline">New</span>
                </button>

                <!-- Admin link (desktop only) -->
                <a href="/admin.html" class="hidden rounded-lg border border-slate-700 bg-slate-800 px-2.5 py-1.5 text-xs font-bold text-slate-200 transition-all hover:bg-slate-600 sm:inline-flex sm:px-3 sm:py-2">⚙️</a>

                <!-- API Key (desktop) -->
                <button id="api-key-btn" class="hidden rounded-lg border px-2.5 py-1.5 text-xs font-semibold transition-all sm:inline-flex sm:px-3 sm:py-2" title="Click to change API key">🔑</button>
            </div>
        </header>

        <!-- Desktop info bar -->
        <div class="mb-2 hidden flex-wrap items-center justify-between gap-2 rounded-lg border border-slate-800 bg-slate-900 px-4 py-2 text-xs text-slate-400 sm:flex">
            <div class="flex items-center gap-3">
                <span id="info-user">👤 <span class="text-slate-200">—</span></span>
                <span class="text-slate-600">·</span>
                <span id="info-project">📁 <span class="text-indigo-300">test</span></span>
                <span class="text-slate-600">·</span>
                <span id="info-mode">⚡ <span class="text-green-400">Lite</span></span>
                <span class="text-slate-600">·</span>
                <span id="info-model">Gemma 4 12B Q4 · 8K ctx</span>
            </div>
            <div class="flex items-center gap-3">
                <span id="info-stream" class="text-purple-400">⚡ Stream ON</span>
                <span id="info-search" class="text-slate-500">🔍 Search OFF</span>
                <span id="info-queue" class="text-yellow-600">⏳ Queue: <span id="queue-active-info">0</span>/<span id="queue-cap-info">8</span></span>
            </div>
        </div>

        <div id="chat-window" class="chat-container mb-2 flex min-h-0 flex-1 flex-col space-y-3 overflow-y-auto rounded-xl border border-slate-800 bg-slate-900 p-3 shadow-2xl shadow-black/20 sm:mb-4 sm:space-y-4 sm:p-6">
            <div class="self-start rounded-2xl rounded-tl-none border border-slate-700 bg-slate-800 p-4 text-slate-100 shadow-sm message-bubble">
                Xin chào! Mình là AI Assistant chạy local trên GPU. Gõ câu hỏi để bắt đầu nhé.
            </div>
        </div>

        <div class="input-shell shrink-0">
            <div id="image-preview-container" class="mb-2 hidden items-center space-x-2 rounded-xl border border-slate-700 bg-slate-900 p-2">
                <div class="relative">
                    <img id="image-preview" src="" class="h-16 w-16 object-cover rounded-lg border border-slate-700">
                    <button id="remove-image" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md hover:bg-red-600 transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
                <span id="file-name" class="text-xs text-slate-400 truncate max-w-[150px]"></span>
            </div>
            <div class="flex items-center gap-1 rounded-2xl border border-slate-700 bg-slate-900 p-2 shadow-2xl shadow-black/20 sm:gap-2">
                <button id="attach-btn" class="shrink-0 p-2 text-slate-400 transition-all hover:text-blue-400 active:scale-90 sm:p-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </button>
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <input type="text" id="user-input" class="min-w-0 flex-1 bg-transparent px-2 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:outline-none sm:p-4 sm:text-base" placeholder="Nhập câu hỏi...">
                <button id="send-btn" class="flex shrink-0 items-center rounded-xl bg-blue-600 px-4 py-2 font-bold text-white shadow-lg transition-all hover:bg-blue-700 active:scale-95 disabled:opacity-50 sm:px-6">Send</button>
            </div>
            <div id="status" class="mt-2 min-h-4 truncate px-2 font-mono text-[10px] text-slate-500">
                <span id="queue-badge" class="hidden mr-2 rounded bg-yellow-800 px-1 text-yellow-200">&#9203; Queue: <span id="queue-active">0</span>/<span id="queue-cap">8</span></span>
            </div>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        const statusDiv = document.getElementById('status');
        const modeLiteBtn = document.getElementById('mode-lite');
        const modeThinkingBtn = document.getElementById('mode-thinking');
        const attachBtn = document.getElementById('attach-btn');
        const fileInput = document.getElementById('file-input');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image');
        const fileNameSpan = document.getElementById('file-name');
        const currentUserBadge = document.getElementById('current-user-badge');
        const currentProjectBadge = document.getElementById('current-project-badge');
        const apiKeyBtn = document.getElementById('api-key-btn');
        const streamToggleBtn = document.getElementById('stream-toggle-btn');
        const searchToggleBtn = document.getElementById('search-toggle-btn');

        // ── localStorage fallback (in-app browsers may block it) ───────
        const storage = (() => {
            try {
                localStorage.setItem('__chk', '1');
                localStorage.removeItem('__chk');
                return localStorage;
            } catch (_) {
                const mem = new Map();
                return {
                    getItem: (k) => mem.has(k) ? mem.get(k) : null,
                    setItem: (k, v) => mem.set(k, String(v)),
                    removeItem: (k) => mem.delete(k),
                };
            }
        })();

        // ── Custom modals (window.prompt/confirm blocked in WebView) ───
        function showInputModal(title, defaultValue = '', inputType = 'text') {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.75);padding:1rem';
                overlay.innerHTML = `
                    <div style="width:100%;max-width:22rem;background:#0f172a;border:1px solid #334155;border-radius:1rem;padding:1.5rem;box-shadow:0 25px 50px rgba(0,0,0,.6)">
                        <p style="margin:0 0 1rem;font-size:.875rem;font-weight:600;color:#f1f5f9">${title}</p>
                        <input type="${inputType}" style="width:100%;box-sizing:border-box;background:#1e293b;border:1px solid #475569;border-radius:.5rem;padding:.5rem .75rem;font-size:.875rem;color:#f1f5f9;outline:none" value="${defaultValue.replace(/"/g, '&quot;')}">
                        <div style="margin-top:1rem;display:flex;gap:.5rem;justify-content:flex-end">
                            <button class="m-cancel" style="background:transparent;border:1px solid #475569;border-radius:.5rem;padding:.5rem 1rem;font-size:.875rem;font-weight:600;color:#94a3b8;cursor:pointer">Cancel</button>
                            <button class="m-ok" style="background:#2563eb;border:none;border-radius:.5rem;padding:.5rem 1rem;font-size:.875rem;font-weight:700;color:#fff;cursor:pointer">OK</button>
                        </div>
                    </div>`;
                document.body.appendChild(overlay);
                const inp = overlay.querySelector('input');
                const okBtn = overlay.querySelector('.m-ok');
                const cancelBtn = overlay.querySelector('.m-cancel');
                inp.focus(); inp.select();
                const done = (v) => { overlay.remove(); resolve(v); };
                okBtn.addEventListener('click', () => done(inp.value));
                cancelBtn.addEventListener('click', () => done(null));
                inp.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') done(inp.value);
                    if (e.key === 'Escape') done(null);
                });
            });
        }

        function showConfirmModal(message) {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.75);padding:1rem';
                overlay.innerHTML = `
                    <div style="width:100%;max-width:22rem;background:#0f172a;border:1px solid #334155;border-radius:1rem;padding:1.5rem;box-shadow:0 25px 50px rgba(0,0,0,.6)">
                        <p style="margin:0 0 1.25rem;font-size:.875rem;color:#f1f5f9">${message}</p>
                        <div style="display:flex;gap:.5rem;justify-content:flex-end">
                            <button class="m-cancel" style="background:transparent;border:1px solid #475569;border-radius:.5rem;padding:.5rem 1rem;font-size:.875rem;font-weight:600;color:#94a3b8;cursor:pointer">Cancel</button>
                            <button class="m-ok" style="background:#2563eb;border:none;border-radius:.5rem;padding:.5rem 1rem;font-size:.875rem;font-weight:700;color:#fff;cursor:pointer">OK</button>
                        </div>
                    </div>`;
                document.body.appendChild(overlay);
                const done = (v) => { overlay.remove(); resolve(v); };
                overlay.querySelector('.m-ok').addEventListener('click', () => done(true));
                overlay.querySelector('.m-cancel').addEventListener('click', () => done(false));
            });
        }

        let currentSessionId = storage.getItem('sessionId') || null;
        let currentProject = storage.getItem('projectId') || 'test';
        let currentMode = storage.getItem('modelMode') || 'lite';
        if (currentMode === 'normal') {
            currentMode = 'thinking';
            storage.setItem('modelMode', currentMode);
        }
        let currentUserName = storage.getItem('userName') || null;
        let currentApiKey = storage.getItem('apiKey') || 'ah_CNbXTLNbDFHPc6-FZtmW-_nIksBIOmBAS3UyeU8JVSI';
        let selectedFile = null;
        let searchEnabled = false;
        let streamEnabled = true;

        // ── Stream toggle ──────────────────────────────────────────────
        function setStreamEnabled(enabled) {
            streamEnabled = enabled;
            const stateEl = document.getElementById('stream-state');
            const infoEl = document.getElementById('info-stream');
            const infoMobileEl = document.getElementById('stream-toggle-btn');
            if (stateEl) stateEl.textContent = enabled ? ' ON' : ' OFF';
            if (infoEl) infoEl.className = enabled ? 'text-purple-400' : 'text-slate-500';
            if (infoEl) infoEl.textContent = enabled ? '⚡ Stream ON' : '⚡ Stream OFF';
            if (infoMobileEl) {
                infoMobileEl.className = enabled
                    ? 'flex items-center gap-1 whitespace-nowrap rounded-lg border border-purple-300 bg-purple-100 px-2.5 py-1.5 text-xs font-bold text-purple-700 transition-all sm:px-3 sm:py-2'
                    : 'flex items-center gap-1 whitespace-nowrap rounded-lg border border-slate-700 bg-slate-800 px-2.5 py-1.5 text-xs font-bold text-slate-300 transition-all hover:bg-slate-600 sm:px-3 sm:py-2';
            }
        }

        streamToggleBtn.addEventListener('click', () => {
            setStreamEnabled(!streamEnabled);
        });

        // ── Search toggle ──────────────────────────────────────────────
        function setSearchEnabled(enabled) {
            searchEnabled = enabled;
            const stateEl = document.getElementById('search-state');
            const infoEl = document.getElementById('info-search');
            if (stateEl) stateEl.textContent = enabled ? ' ON' : ' OFF';
            if (infoEl) infoEl.className = enabled ? 'text-green-400' : 'text-slate-500';
            if (infoEl) infoEl.textContent = enabled ? '🔍 Search ON' : '🔍 Search OFF';
        }

        searchToggleBtn.addEventListener('click', () => {
            setSearchEnabled(!searchEnabled);
            if (searchEnabled) {
                statusDiv.textContent = 'Muốn dùng search thì nhập /search: nội dung cần search';
            }
        });

        // ── Image helpers ──────────────────────────────────────────────
        function resetSelectedImage() {
            selectedFile = null;
            fileInput.value = '';
            imagePreviewContainer.classList.add('hidden');
            imagePreview.src = '';
            fileNameSpan.textContent = '';
        }

        // ── User / API key badges ──────────────────────────────────────
        function updateCurrentUserBadge() {
            const nameText = document.getElementById('user-name-text');
            const infoUser = document.getElementById('info-user');
            if (nameText) nameText.textContent = currentUserName || '—';
            if (infoUser) infoUser.innerHTML = `👤 <span class="text-slate-200">${currentUserName || '—'}</span>`;
        }

        function updateCurrentApiKeyBadge() {
            if (!currentApiKey) {
                apiKeyBtn.textContent = '🔑';
                apiKeyBtn.className = 'hidden rounded-lg border border-red-500 bg-red-950 px-2.5 py-1.5 text-xs font-semibold text-red-400 transition-all sm:inline-flex sm:px-3 sm:py-2';
                return;
            }
            apiKeyBtn.textContent = '🔑';
            apiKeyBtn.className = 'hidden rounded-lg border border-green-700 bg-green-950 px-2.5 py-1.5 text-xs font-semibold text-green-400 transition-all sm:inline-flex sm:px-3 sm:py-2';
        }

        const KNOWN_PROJECTS_DEFAULT = ['test','playground','research_lab','support_bot','sales_bot','legal_advisor','medical_q','customer_q','internal_wiki','iot','vehix','stock_prediction']; const KNOWN_PROJECTS_DEMO = ['test','sales_bot','playground','internal_wiki']; const KNOWN_PROJECTS = (currentApiKey === 'ah_CNbXTLNbDFHPc6-FZtmW-_nIksBIOmBAS3UyeU8JVSI') ? KNOWN_PROJECTS_DEMO : KNOWN_PROJECTS_DEFAULT;

        function updateCurrentProjectBadge() {
            const projText = document.getElementById('project-name-text');
            const infoProject = document.getElementById('info-project');
            if (projText) projText.textContent = currentProject;
            if (infoProject) infoProject.innerHTML = `📁 <span class="text-indigo-300">${currentProject}</span>`;
        }

        function promptForProject() {
            return new Promise((resolve) => {
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.75);padding:1rem';
                const chips = KNOWN_PROJECTS.map(p =>
                    `<button data-p="${p}" style="background:${p===currentProject?'#4338ca':'#1e293b'};border:1px solid ${p===currentProject?'#818cf8':'#475569'};border-radius:.375rem;padding:.25rem .625rem;font-size:.75rem;font-weight:600;color:${p===currentProject?'#e0e7ff':'#94a3b8'};cursor:pointer;white-space:nowrap">${p}</button>`
                ).join('');
                overlay.innerHTML = `
                    <div style="width:100%;max-width:26rem;background:#0f172a;border:1px solid #334155;border-radius:1rem;padding:1.5rem;box-shadow:0 25px 50px rgba(0,0,0,.6)">
                        <p style="margin:0 0 .75rem;font-size:.875rem;font-weight:600;color:#f1f5f9">Select project:</p>
                        <div style="display:flex;flex-wrap:wrap;gap:.375rem;margin-bottom:1rem">${chips}</div>
                        <p style="margin:0 0 .375rem;font-size:.75rem;color:#64748b">Or type custom project ID:</p>
                        <input type="text" style="width:100%;box-sizing:border-box;background:#1e293b;border:1px solid #475569;border-radius:.5rem;padding:.5rem .75rem;font-size:.875rem;color:#f1f5f9;outline:none" value="${currentProject}">
                        <div style="margin-top:1rem;display:flex;gap:.5rem;justify-content:flex-end">
                            <button class="m-cancel" style="background:transparent;border:1px solid #475569;border-radius:.5rem;padding:.5rem 1rem;font-size:.875rem;font-weight:600;color:#94a3b8;cursor:pointer">Cancel</button>
                            <button class="m-ok" style="background:#4338ca;border:none;border-radius:.5rem;padding:.5rem 1rem;font-size:.875rem;font-weight:700;color:#fff;cursor:pointer">OK</button>
                        </div>
                    </div>`;
                document.body.appendChild(overlay);
                const inp = overlay.querySelector('input');
                inp.focus(); inp.select();
                overlay.querySelectorAll('[data-p]').forEach(btn => {
                    btn.addEventListener('click', () => { inp.value = btn.dataset.p; });
                });
                const done = (v) => { overlay.remove(); resolve(v); };
                overlay.querySelector('.m-ok').addEventListener('click', () => done(inp.value.trim()));
                overlay.querySelector('.m-cancel').addEventListener('click', () => done(null));
                inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') done(inp.value.trim()); if (e.key === 'Escape') done(null); });
            });
        }

        async function changeProject() {
            const selected = await promptForProject();
            if (!selected) return;
            if (selected === currentProject) return;
            currentProject = selected;
            storage.setItem('projectId', currentProject);
            currentSessionId = null;
            storage.removeItem('sessionId');
            updateCurrentProjectBadge();
            chatWindow.innerHTML = '';
            addBubble(`Switched to project: ${currentProject}. New session started.`, false);
            statusDiv.textContent = `Project: ${currentProject}`;
        }

        async function promptForApiKey(defaultValue = currentApiKey || '') {
            const provided = await showInputModal('Enter your API key:', defaultValue);
            if (provided === null) return false;
            const trimmed = provided.trim();
            if (!trimmed) { statusDiv.textContent = 'API key is required before chatting'; return false; }
            currentApiKey = trimmed;
            storage.setItem('apiKey', currentApiKey);
            updateCurrentApiKeyBadge();
            return true;
        }

        async function ensureApiKey() {
            if (currentApiKey) return true;
            return promptForApiKey('');
        }

        function buildApiHeaders() {
            return { 'Content-Type': 'application/json', 'X-API-KEY': currentApiKey };
        }

        // ── Mode UI ────────────────────────────────────────────────────
        function applyModeUI() {
            const isLite = currentMode === 'lite';
            modeLiteBtn.className = isLite
                ? 'text-xs font-bold py-1 px-3 rounded-md transition-all bg-green-500 text-white shadow'
                : 'text-xs font-bold py-1 px-3 rounded-md transition-all text-slate-400 hover:text-slate-200';
            modeThinkingBtn.className = 'hidden';
            if (isLite) {
                attachBtn.disabled = false;
                attachBtn.classList.remove('hidden', 'opacity-40', 'cursor-not-allowed');
            } else {
                attachBtn.disabled = true;
                attachBtn.classList.add('opacity-40', 'cursor-not-allowed');
                resetSelectedImage();
            }

            // Sync mode info across UI
            const modeLabel = document.getElementById('mode-label-compact');
            const modeDotMobile = document.getElementById('mode-dot-mobile');
            const infoMode = document.getElementById('info-mode');
            if (modeLabel) modeLabel.textContent = isLite ? 'Lite' : 'Thinking';
            if (modeDotMobile) modeDotMobile.className = isLite ? 'w-2 h-2 rounded-full bg-green-500' : 'w-2 h-2 rounded-full bg-purple-500';
            if (infoMode) infoMode.innerHTML = isLite ? '⚡ <span class="text-green-400">Lite</span>' : '🧠 <span class="text-purple-400">Thinking</span>';
        }

        async function switchServerModel(mode) {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 120000);
            try {
                const response = await fetch('/v1/admin/model/switch', {
                    method: 'POST',
                    headers: buildApiHeaders(),
                    body: JSON.stringify({ mode }),
                    signal: controller.signal,
                });
                if (!response.ok) {
                    let detail = `Model switch failed (${response.status})`;
                    try {
                        const error = await response.json();
                        detail = typeof error.detail === 'string' ? error.detail : JSON.stringify(error.detail);
                    } catch (_) {}
                    throw new Error(detail);
                }
                return response.json();
            } finally {
                clearTimeout(timeout);
            }
        }

        async function confirmAndSwitchMode(mode) {
            if (currentMode === mode) {
                applyModeUI();
                return;
            }
            if (!await ensureApiKey()) return;
            const isLite = mode === 'lite';
            const label = isLite ? 'Lite Q8' : 'Thinking Qwen 27B';
            const message = isLite
                ? 'Switch back to Lite Q8? The server will switch in the background; wait a moment before chatting.'
                : 'Switch to Thinking Qwen 27B? The server will switch in the background; wait a moment before chatting.';
            if (!await showConfirmModal(message)) return;

            currentMode = mode;
            storage.setItem('modelMode', currentMode);
            applyModeUI();
            statusDiv.textContent = `Đang chuyển sang ${label}...`;

            switchServerModel(mode)
                .then((result) => {
                    statusDiv.textContent = `${label} sẵn sàng: ${(result.models || []).join(', ')}`;
                })
                .catch((error) => {
                    statusDiv.textContent = error.name === 'AbortError'
                        ? `${label} đang chạy nền. Đợi một chút rồi thử lại nếu chat không hoạt động.`
                        : `Model đang chuyển nền. Thử refresh nếu chat không hoạt động: ${error.message}`;
                });
        }

        modeLiteBtn.addEventListener('click', () => { confirmAndSwitchMode('lite'); });
        modeThinkingBtn.addEventListener('click', () => { confirmAndSwitchMode('thinking'); });
        apiKeyBtn.addEventListener('click', async () => { if (await promptForApiKey(currentApiKey || '')) statusDiv.textContent = 'API key updated'; });
        currentUserBadge.addEventListener('click', async () => { if (await promptForUserName(currentUserName || '', true)) statusDiv.textContent = `User changed to ${currentUserName}`; });
        currentProjectBadge.addEventListener('click', changeProject);

        // ── Session restore ────────────────────────────────────────────
        async function restoreLatestSessionForUser() {
            if (!currentUserName) { currentSessionId = null; storage.removeItem('sessionId'); return; }
            const response = await fetch(`/v1/users/${encodeURIComponent(currentUserName)}/sessions?project_id=${encodeURIComponent(currentProject)}`, { headers: buildApiHeaders() });
            if (!response.ok) throw new Error('Failed to load previous sessions');
            const sessions = await response.json();
            if (sessions.length > 0) {
                currentSessionId = sessions[0].session_id;
                storage.setItem('sessionId', currentSessionId);
                statusDiv.textContent = `Resumed latest session for ${currentUserName}`;
                return;
            }
            currentSessionId = null; storage.removeItem('sessionId');
            statusDiv.textContent = `Started a fresh session for ${currentUserName}`;
        }

        async function promptForUserName(defaultValue = currentUserName || '', shouldRestoreSession = true) {
            const provided = await showInputModal('Enter your name:', defaultValue);
            if (provided === null) return false;
            const trimmed = provided.trim();
            if (!trimmed) { statusDiv.textContent = 'User name is required'; return false; }
            currentUserName = trimmed;
            storage.setItem('userName', currentUserName);
            updateCurrentUserBadge();
            if (shouldRestoreSession) await restoreLatestSessionForUser();
            return true;
        }

        async function ensureUserName() {
            if (currentUserName) return true;
            return promptForUserName('', true);
        }

        async function loadExistingMemoryGreeting() {
            if (!currentUserName || !currentApiKey) return null;
            const params = new URLSearchParams({ project_id: currentProject, user_name: currentUserName });
            const response = await fetch(`/v1/memory?${params.toString()}`, { headers: buildApiHeaders() });
            if (!response.ok) return null;
            const memory = await response.json();
            const parts = [];
            if (memory.summary?.content) {
                parts.push(`Tóm tắt lần trước của ${currentUserName}:\n${memory.summary.content}`);
            }
            if (Array.isArray(memory.pinned_memories) && memory.pinned_memories.length > 0) {
                const pinned = memory.pinned_memories
                    .slice(0, 5)
                    .map((item) => `- ${item.key}: ${item.value}`)
                    .join('\n');
                parts.push(`Thông tin đã lưu:\n${pinned}`);
            }
            if (parts.length === 0) return null;
            return `${parts.join('\n\n')}\n\nMình đã mở session mới, nhưng vẫn nhớ các thông tin trên nếu bạn muốn tiếp tục.`;
        }

        refreshBtn.addEventListener('click', async () => {
            if (!await ensureApiKey()) return;
            if (!await promptForUserName(currentUserName || '', false)) return;
            currentSessionId = null;
            storage.removeItem('sessionId');
            resetSelectedImage();
            chatWindow.innerHTML = '';
            statusDiv.textContent = `Started a new session for ${currentUserName}`;
            try {
                addBubble(await loadExistingMemoryGreeting() || 'New session ready. How can I help you today?', false);
            } catch (_) {
                addBubble('Sẵn sàng trò chuyện. Mình có thể giúp gì cho bạn?', false);
            }
        });

        // ── File handling ──────────────────────────────────────────────
        attachBtn.addEventListener('click', () => {
            if (currentMode !== 'lite') { statusDiv.textContent = 'Image upload is available only in Lite mode'; return; }
            fileInput.click();
        });
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (currentMode !== 'lite') { resetSelectedImage(); return; }
            if (file && file.type.startsWith('image/')) {
                selectedFile = file;
                fileNameSpan.textContent = file.name;
                const reader = new FileReader();
                reader.onload = (ev) => { imagePreview.src = ev.target.result; imagePreviewContainer.classList.remove('hidden'); };
                reader.readAsDataURL(file);
            }
        });
        removeImageBtn.addEventListener('click', resetSelectedImage);

        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
            });
        }

        // ── Chat bubble helpers ────────────────────────────────────────
        function addBubble(text, isUser = false, images = []) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? 'flex justify-end' : 'flex justify-start';
            const div = document.createElement('div');
            div.className = isUser
                ? 'bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none message-bubble shadow-md'
                : 'border border-slate-700 bg-slate-800 text-slate-100 p-4 rounded-2xl rounded-tl-none message-bubble shadow-sm';
            if (images.length > 0) {
                images.forEach((src) => {
                    const img = document.createElement('img');
                    img.src = src;
                    img.className = 'max-w-full h-auto rounded-lg mb-2 border border-blue-400';
                    div.appendChild(img);
                });
            }
            const textSpan = document.createElement('span');
            textSpan.textContent = text;
            div.appendChild(textSpan);
            wrapper.appendChild(div);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return textSpan;
        }

        // Create an empty assistant bubble and return its text span (for streaming)
        function createAssistantBubble() {
            const wrapper = document.createElement('div');
            wrapper.className = 'flex justify-start';
            const div = document.createElement('div');
            div.className = 'border border-slate-700 bg-slate-800 text-slate-100 p-4 rounded-2xl rounded-tl-none message-bubble shadow-sm';
            const textSpan = document.createElement('span');
            textSpan.className = 'cursor-blink';
            div.appendChild(textSpan);
            wrapper.appendChild(div);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return textSpan;
        }

        function isSearchCommand(text) {
            return /^\s*\/search(?::|\s+)\s*.+/i.test(text);
        }

        function startsWithSearchCommand(text) {
            return /^\s*\/search\b/i.test(text);
        }

        function isClearCommand(text) {
            return /^\s*\/clear\s*$/i.test(text);
        }

        function isNewCommand(text) {
            return /^\s*\/new\s*$/i.test(text);
        }

        async function setMemoryBoundary() {
            if (!currentApiKey || !currentUserName) {
                statusDiv.textContent = 'No active user session';
                return;
            }
            try {
                const params = new URLSearchParams({ project_id: currentProject });
                const resp = await fetch(`/v1/users/${encodeURIComponent(currentUserName)}/memory-boundary?${params}`, {
                    method: 'POST',
                    headers: buildApiHeaders(),
                });
                if (!resp.ok) {
                    let detail = `New session failed (${resp.status})`;
                    try { const err = await resp.json(); detail = err.detail || detail; } catch (_) {}
                    throw new Error(detail);
                }
                currentSessionId = null;
                storage.removeItem('sessionId');
                chatWindow.innerHTML = '';
                addBubble('Bắt đầu cuộc trò chuyện mới. Lịch sử cũ vẫn lưu trong database nhưng sẽ không xuất hiện trong context.', false);
                statusDiv.textContent = `New conversation for ${currentUserName}`;
            } catch (err) {
                statusDiv.textContent = 'Failed to start new conversation: ' + err.message;
            }
        }

        async function clearUserHistory() {
            if (!currentApiKey || !currentUserName) {
                statusDiv.textContent = 'No active user session to clear';
                return;
            }
            try {
                const params = new URLSearchParams({ project_id: currentProject });
                const resp = await fetch(`/v1/users/${encodeURIComponent(currentUserName)}/history?${params}`, {
                    method: 'DELETE',
                    headers: buildApiHeaders(),
                });
                if (!resp.ok) {
                    let detail = `Clear failed (${resp.status})`;
                    try { const err = await resp.json(); detail = err.detail || detail; } catch (_) {}
                    throw new Error(detail);
                }
                currentSessionId = null;
                storage.removeItem('sessionId');
                chatWindow.innerHTML = '';
                addBubble('History cleared. Starting fresh!', false);
                statusDiv.textContent = `History cleared for ${currentUserName}`;
            } catch (err) {
                statusDiv.textContent = 'Failed to clear history: ' + err.message;
            }
        }

        // ── Streaming send ─────────────────────────────────────────────
        async function sendStreaming(payload) {
            const response = await fetch('/v1/chat', {
                method: 'POST',
                headers: buildApiHeaders(),
                body: JSON.stringify({ ...payload, stream: true }),
            });

            if (!response.ok) {
                let detail = `API error (${response.status})`;
                try { const err = await response.json(); detail = err.detail || detail; } catch (_) {}
                throw new Error(detail);
            }

            const textSpan = createAssistantBubble();
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let sessionId = null;
            let latencyMs = null;

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });

                    // Process complete SSE lines
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // keep incomplete last line

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const raw = line.slice(6).trim();
                        if (raw === '[DONE]') { textSpan.classList.remove('cursor-blink'); return { sessionId, latencyMs }; }

                        let event;
                        try { event = JSON.parse(raw); } catch (_) { continue; }

                        if (event.type === 'start') {
                            sessionId = event.session_id;
                        } else if (event.type === 'chunk') {
                            textSpan.textContent += event.content;
                            chatWindow.scrollTop = chatWindow.scrollHeight;
                        } else if (event.type === 'done') {
                            sessionId = event.session_id;
                            latencyMs = event.latency_ms;
                            textSpan.classList.remove('cursor-blink');
                        } else if (event.type === 'error') {
                            textSpan.classList.remove('cursor-blink');
                            textSpan.textContent = `Error (${event.code}): ${event.detail}`;
                            textSpan.closest('div').className = 'bg-red-50 text-red-700 p-4 rounded-2xl rounded-tl-none message-bubble shadow-sm border border-red-200';
                        }
                    }
                }
            } finally {
                textSpan.classList.remove('cursor-blink');
            }
            return { sessionId, latencyMs };
        }

        // ── Non-streaming send ─────────────────────────────────────────
        async function sendNonStreaming(payload) {
            const response = await fetch('/v1/chat', {
                method: 'POST',
                headers: buildApiHeaders(),
                body: JSON.stringify({ ...payload, stream: false }),
            });
            if (!response.ok) {
                let detail = `API error (${response.status})`;
                try { const err = await response.json(); detail = err.detail || detail; } catch (_) {}
                throw new Error(detail);
            }
            const data = await response.json();
            addBubble(data.content, false);
            return { sessionId: data.session_id, latencyMs: data.latency_ms };
        }

        // ── Main send handler ──────────────────────────────────────────
        async function sendMessage() {
            if (!await ensureApiKey()) { userInput.focus(); return; }
            if (!await ensureUserName()) { userInput.focus(); return; }

            const message = userInput.value.trim();
            if (!message && !selectedFile) return;

            if (isClearCommand(message)) {
                userInput.value = '';
                await clearUserHistory();
                userInput.focus();
                return;
            }

            if (isNewCommand(message)) {
                userInput.value = '';
                await setMemoryBoundary();
                userInput.focus();
                return;
            }

            if (!searchEnabled && startsWithSearchCommand(message)) {
                statusDiv.textContent = 'Search đang OFF. Bật Search rồi nhập /search: nội dung cần search';
                addBubble('Search đang OFF. Bật Search rồi gửi lại lệnh /search.', false);
                userInput.focus();
                return;
            }

            let images = [], imagePreviews = [];
            if (selectedFile && currentMode === 'lite') {
                images.push(await fileToBase64(selectedFile));
                imagePreviews.push(imagePreview.src);
                resetSelectedImage();
            }

            userInput.value = '';
            addBubble(message || 'Analyze this image', true, imagePreviews);

            const startTime = performance.now();
            const explicitSearch = searchEnabled && isSearchCommand(message);
            const useStream = streamEnabled && !explicitSearch;
            if (explicitSearch && streamEnabled) {
                setStreamEnabled(false);
                statusDiv.textContent = 'Search sẽ chạy với Stream OFF để ổn định hơn';
            } else if (searchEnabled && !explicitSearch && message) {
                statusDiv.textContent = 'Search đang ON. Muốn dùng search thì nhập /search: nội dung cần search';
            } else {
                statusDiv.innerHTML = useStream
                    ? '<span class="loader mr-2"></span> Đang trả lời...'
                    : `<span class="loader mr-2"></span> ${currentMode === 'lite' ? 'Gemma 4' : 'Thinking'} đang xử lý...`;
            }
            sendBtn.disabled = true;
            _startQueuePoll();

            const payload = {
                project_id: currentProject,
                user_name: currentUserName,
                user_message: message || 'Analyze this image',
                session_id: currentSessionId,
                model_mode: currentMode,
                enable_search: searchEnabled,
                allow_external: explicitSearch,
            };
            if (currentMode === 'lite' && images.length > 0) payload.images = images;

            try {
                const { sessionId, latencyMs } = useStream
                    ? await sendStreaming(payload)
                    : await sendNonStreaming(payload);

                if (sessionId) {
                    currentSessionId = sessionId;
                    storage.setItem('sessionId', currentSessionId);
                }

                const elapsed = latencyMs != null
                    ? (latencyMs / 1000).toFixed(2)
                    : ((performance.now() - startTime) / 1000).toFixed(2);

                statusDiv.textContent = `LATENCY: ${elapsed}s | SESSION: ${(sessionId || '').substring(0, 8)}... | MODE: ${currentMode.toUpperCase()}${explicitSearch ? ' | SEARCH | STREAM OFF' : ''}${useStream ? ' | STREAMED' : ''}`;
            } catch (error) {
                console.error(error);
                addBubble('Error: ' + error.message, false);
                statusDiv.textContent = 'ERROR: ' + error.message;
            } finally {
                sendBtn.disabled = false;
                _stopQueuePoll();
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // ── Queue depth polling ─────────────────────────────────────────
        const queueBadge = document.getElementById('queue-badge');
        const queueActive = document.getElementById('queue-active');
        const queueCap = document.getElementById('queue-cap');
        let _queueTimer = null;

        function _startQueuePoll() {
            _stopQueuePoll();
            _queueTimer = setInterval(async () => {
                try {
                    const r = await fetch('/v1/admin/queue', { headers: { 'X-API-KEY': currentApiKey || '' } });
                    if (!r.ok) return;
                    const d = await r.json();

                    // Mobile badge
                    queueCap.textContent = d.capacity;
                    queueActive.textContent = d.active;
                    queueBadge.classList.toggle('hidden', d.active === 0);

                    // Mobile compact header badge
                    const queueBadgeMobile = document.getElementById('queue-badge-mobile');
                    const queueActiveMobile = document.getElementById('queue-active-mobile');
                    const queueCapMobile = document.getElementById('queue-cap-mobile');
                    if (queueBadgeMobile) {
                        queueActiveMobile.textContent = d.active;
                        queueCapMobile.textContent = d.capacity;
                        queueBadgeMobile.classList.toggle('hidden', d.active === 0);
                    }

                    // Desktop info bar
                    const queueActiveInfo = document.getElementById('queue-active-info');
                    const queueCapInfo = document.getElementById('queue-cap-info');
                    if (queueActiveInfo) queueActiveInfo.textContent = d.active;
                    if (queueCapInfo) queueCapInfo.textContent = d.capacity;
                } catch (_) {}
            }, 3000);
        }
        function _stopQueuePoll() {
            clearInterval(_queueTimer);
            _queueTimer = null;
            queueBadge.classList.add('hidden');
            const queueBadgeMobile = document.getElementById('queue-badge-mobile');
            if (queueBadgeMobile) queueBadgeMobile.classList.add('hidden');
        }


        // ── Init ───────────────────────────────────────────────────────
        updateCurrentApiKeyBadge();
        updateCurrentUserBadge();
        updateCurrentProjectBadge();
        applyModeUI();
        if (!currentApiKey) {
            statusDiv.textContent = 'Nhập API key để bắt đầu trò chuyện';
        } else if (!currentUserName) {
            statusDiv.textContent = 'Nhập tên của bạn để bắt đầu';
        } else {
            restoreLatestSessionForUser().catch((err) => { console.error(err); statusDiv.textContent = 'Không khôi phục được session trước'; });
        }
        userInput.focus();

        // ── Fetch live model info from /health (updates on page load) ───
        (async () => {
            try {
                const headers = currentApiKey ? { 'X-API-KEY': currentApiKey } : {};
                const r = await fetch('/health', { headers });
                if (!r.ok) return;
                const data = await r.json();
                const local = data.local || {};
                const model = (local.models && local.models[0]) || null;
                if (model) {
                    const infoEl = document.getElementById('info-model');
                    if (infoEl) {
                        // Map alias → human label + ctx
                        const m = model.toLowerCase();
                        if (m.includes('12b')) {
                            infoEl.textContent = 'Gemma 4 12B Q4 · 8K ctx';
                        } else if (m.includes('e2b')) {
                            infoEl.textContent = 'Gemma 4 E2B Q4 · 8K ctx';
                        } else if (m.includes('e4b')) {
                            infoEl.textContent = 'Gemma 4 E4B Q4 · 32K ctx';
                        } else {
                            infoEl.textContent = model;
                        }
                    }
                }
            } catch (_) { /* /health not ready yet — keep hardcoded label */ }
        })();
    </script>
</body>
