<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020617">
    <title>AI Hub | Chat Viewer</title>
    <style>
        * { box-sizing: border-box; }

        :root {
            --bg-base: #020617;
            --bg-panel: rgba(30, 41, 59, 0.35);
            --bg-elevated: rgba(15, 23, 42, 0.65);
            --bg-input: #0b1224;
            --border-subtle: rgba(255,255,255,0.06);
            --border-strong: rgba(255,255,255,0.14);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-faint: #475569;
            --accent-1: #6366f1;
            --accent-2: #a855f7;
            --status-ok: #10b981;
            --shadow-soft: 0 2px 18px rgba(2,6,23,0.4);
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-image:
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.10) 0px, transparent 55%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.06) 0px, transparent 50%);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .chat-header-info {
            display: flex;
            gap: 2rem;
            align-items: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .chat-header-info span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 0.625rem 1.125rem;
            border-radius: 0.625rem;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.18s ease;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.03);
            color: var(--text-primary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
        }

        .msg-pair {
            display: grid;
            grid-template-columns: 3.5rem 1fr;
            gap: 0.1rem 0.6rem;
            padding: 0.5rem 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
            line-height: 1.5;
        }
        .msg-pair:hover { background: rgba(255,255,255,0.025); }
        .msg-pair .meta {
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.15rem;
            padding-top: 0.15rem;
        }
        .msg-pair .meta .time { font-size: 0.7rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .msg-pair .meta .idx { font-size: 0.6rem; color: var(--text-faint); }
        .msg-pair .user-line {
            font-size: 0.85rem;
            color: var(--text-strong);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .msg-pair .user-line::before { content: '▸ '; color: var(--accent-1); }
        .msg-pair .ai-line {
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-left: 0.8rem;
            color: #6ee7b7;
        }
        .msg-pair .ai-line::before { content: '↳ '; color: rgba(110,231,183,0.5); }
        .msg-pair .ai-line.no-reply { color: var(--text-faint); font-style: italic; }
        .date-divider {
            font-size: 0.7rem;
            color: var(--text-faint);
            padding: 0.5rem 0 0.2rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        /* Detail overlay */
        .detail-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .detail-overlay.active { display: flex; }
        .detail-panel {
            background: var(--bg-panel, #1a1a2e);
            border: 1px solid var(--border-subtle);
            border-radius: 0.75rem;
            max-width: 720px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.5rem;
        }
        .detail-panel .detail-section { margin-bottom: 1rem; }
        .detail-panel .detail-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
        .detail-panel .detail-label.user { color: var(--accent-1); }
        .detail-panel .detail-label.ai { color: #6ee7b7; }
        .detail-panel .detail-box {
            background: rgba(0,0,0,0.3);
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
        }
        .detail-panel .detail-box.user { border-left: 3px solid var(--accent-1); }
        .detail-panel .detail-box.ai { border-left: 3px solid #6ee7b7; background: rgba(110,231,183,0.06); }
        .detail-panel .detail-close {
            display: block;
            margin: 0.75rem auto 0;
            padding: 0.4rem 1.5rem;
            border: 1px solid var(--border-subtle);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 1rem;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            opacity: 0.5;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 0.75rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-subtle);
            border-top-color: var(--accent-1);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.16);
        }

        .btn {
            background: var(--accent-1);
            color: white;
            border: 1px solid var(--accent-1);
            padding: 0.5rem 1.25rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.15s ease;
        }
        .btn:hover { background: #4f46e5; border-color: #4f46e5; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div>
                <h1 id="chat-title">Chat</h1>
                <div class="chat-header-info">
                    <span id="user-info">User</span>
                    <span id="message-count">0 messages</span>
                    <span id="last-activity">Last activity: —</span>
                </div>
            </div>
            <button class="back-btn" onclick="goBack()">← Back to Admin</button>
        </div>

        <div class="messages-container" id="messages-container">
            <div class="loading">
                <div class="spinner"></div>
                <span>Loading messages...</span>
            </div>
        </div>
        <div style="text-align:center;padding:1rem;flex-shrink:0;background:rgba(15,23,42,0.4);border-top:1px solid var(--border-subtle)">
            <button id="load-older-btn" class="btn" style="display:none" onclick="loadOlder()">Load older messages</button>
        </div>
    </div>

    <script>
        const API_KEY = localStorage.getItem('api_key') || '1XteCCQ_s_UbrqOGEIYybmDBnokWhxYap90D6_Jojx8';
        const PAGE_SIZE = 50;
        let allMessages = [];     // accumulated across pages
        let totalCount = 0;       // from server's total_count
        let currentOffset = 0;    // how many messages already loaded
        let currentUserId = null;
        let currentProjectId = null;

        async function fetchMessages(offset, limit) {
            const url = `/v1/admin/users/${encodeURIComponent(currentUserId)}/messages?project_id=${encodeURIComponent(currentProjectId)}&limit=${limit}&offset=${offset}`;
            const res = await fetch(url, { headers: { 'X-API-KEY': API_KEY } });
            return await res.json();
        }

        async function loadChat() {
            const params = new URLSearchParams(window.location.search);
            currentUserId = params.get('user_id');
            currentProjectId = params.get('project_id');
            const userName = params.get('user_name');

            if (!currentUserId || !currentProjectId) {
                showEmpty('Missing user or project ID');
                return;
            }

            try {
                // Load user detail
                const userRes = await fetch(`/v1/admin/users/${encodeURIComponent(currentUserId)}/detail`, {
                    headers: { 'X-API-KEY': API_KEY }
                });
                const userDetail = await userRes.json();

                // Load first page
                const messages = await fetchMessages(0, PAGE_SIZE);

                // Capture total count from first message (or 0 if empty)
                totalCount = (messages && messages.length > 0 && messages[0].total_count != null)
                    ? messages[0].total_count
                    : (messages ? messages.length : 0);
                allMessages = messages || [];
                currentOffset = allMessages.length;

                // Update header
                document.getElementById('chat-title').textContent = `${userName || 'User'} — Chat`;
                document.getElementById('user-info').textContent = `User: ${userName || currentUserId}`;
                updateCountLabel();

                if (userDetail.last_message_at) {
                    const date = new Date(userDetail.last_message_at);
                    document.getElementById('last-activity').textContent =
                        `Last activity: ${date.toLocaleString()}`;
                }

                // Display messages
                displayMessages(allMessages);
            } catch (error) {
                console.error('Error loading chat:', error);
                showEmpty('Error loading messages');
            }
        }

        async function loadOlder() {
            const btn = document.getElementById('load-older-btn');
            if (!btn) return;
            const prevLabel = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Loading...';
            try {
                const more = await fetchMessages(currentOffset, PAGE_SIZE);
                if (more && more.length > 0) {
                    allMessages = allMessages.concat(more);
                    currentOffset += more.length;
                    displayMessages(allMessages);
                }
            } catch (e) {
                console.error('loadOlder failed', e);
            } finally {
                btn.disabled = false;
                updateCountLabel();
            }
        }

        function updateCountLabel() {
            const el = document.getElementById('message-count');
            if (el) el.textContent = `${allMessages.length} of ${totalCount} messages`;
            const btn = document.getElementById('load-older-btn');
            if (btn) {
                if (allMessages.length < totalCount) {
                    btn.style.display = '';
                    const remaining = totalCount - allMessages.length;
                    btn.textContent = `Load older (${remaining} more available)`;
                } else {
                    btn.style.display = 'none';
                    btn.textContent = 'Load older messages';
                }
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('messages-container');

            if (!messages || messages.length === 0) {
                showEmpty('No messages yet');
                return;
            }

            // Sort messages by date (oldest first)
            const sorted = [...messages].sort((a, b) =>
                new Date(a.created_at) - new Date(b.created_at)
            );

            // Build pairs
            const pairs = [];
            for (let i = 0; i < sorted.length; i++) {
                const m = sorted[i];
                if (m.role !== 'user') continue;
                const next = sorted[i + 1];
                pairs.push({
                    idx: pairs.length + 1,
                    time: m.created_at,
                    request: m.content || '',
                    response: (next && next.role === 'assistant') ? (next.content || '') : '',
                    response_at: (next && next.role === 'assistant') ? next.created_at : null,
                });
            }

            const trunc = (s, n) => s.length > n ? s.slice(0, n) + '…' : s;
            const timeShort = (iso) => { try { const d = new Date(iso); return d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); } catch { return ''; } };
            const dateKey = (iso) => { try { return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); } catch { return ''; } };

            let html = '';
            let lastDate = '';
            for (const p of pairs) {
                const dk = dateKey(p.time);
                if (dk !== lastDate) { html += `<div class="date-divider">${dk}</div>`; lastDate = dk; }
                const aiText = p.response ? trunc(p.response, 160) : 'no reply';
                const aiClass = p.response ? 'ai-line' : 'ai-line no-reply';
                html += `
                <div class="msg-pair" data-idx="${p.idx - 1}">
                    <div class="meta">
                        <span class="time">${timeShort(p.time)}</span>
                        <span class="idx">#${p.idx}</span>
                    </div>
                    <div class="user-line" title="${escapeHtml(p.request)}">${escapeHtml(trunc(p.request, 180))}</div>
                    <div class="${aiClass}" title="${escapeHtml(p.response || '')}">${escapeHtml(aiText)}</div>
                </div>`;
            }

            container.innerHTML = `<div style="font-size:0.82rem">${html}</div>`;

            // Detail overlay
            let overlay = document.getElementById('detail-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'detail-overlay';
                overlay.className = 'detail-overlay';
                overlay.innerHTML = '<div class="detail-panel" id="detail-panel"></div>';
                overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });
                document.body.appendChild(overlay);
            }

            const showDetail = (p) => {
                const panel = document.getElementById('detail-panel');
                const fmt = (iso) => { try { return new Date(iso).toLocaleString(); } catch { return iso || ''; } };
                panel.innerHTML = `
                    <div class="detail-section">
                        <div class="detail-label user">REQUEST #${p.idx} • ${fmt(p.time)}</div>
                        <div class="detail-box user">${escapeHtml(p.request)}</div>
                    </div>
                    ${p.response ? `
                    <div class="detail-section">
                        <div class="detail-label ai">RESPONSE ${p.response_at ? '• ' + fmt(p.response_at) : ''}</div>
                        <div class="detail-box ai">${escapeHtml(p.response)}</div>
                    </div>` : '<div style="color:var(--text-faint);font-style:italic;margin-bottom:1rem">No response</div>'}
                    <button class="detail-close" onclick="document.getElementById(\'detail-overlay\').classList.remove(\'active\')">Close</button>
                `;
                overlay.classList.add('active');
            };

            container.querySelectorAll('.msg-pair').forEach(row => {
                row.style.cursor = 'pointer';
                row.addEventListener('click', () => {
                    const idx = parseInt(row.dataset.idx);
                    if (pairs[idx]) showDetail(pairs[idx]);
                });
            });

            // Update header count
            updateCountLabel();
        }

        function showEmpty(text) {
            const container = document.getElementById('messages-container');
            container.innerHTML = `
                <div class="empty-state">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                    <div>${text}</div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function goBack() {
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('project_id');
            const userId = params.get('user_id');

            // Go back to admin with user detail view
            window.location.href = `/admin.html?view=user&project=${projectId}&user=${userId}`;
        }

        // Load chat on page load
        loadChat();
    </script>
</body>
</html>
