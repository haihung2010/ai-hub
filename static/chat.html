<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020617">
    <title>AI Hub | Chat Viewer</title>
    <style>
        * { box-sizing: border-box; }

        :root {
            --bg-base: #020617;
            --bg-panel: rgba(30, 41, 59, 0.35);
            --bg-elevated: rgba(15, 23, 42, 0.65);
            --bg-input: #0b1224;
            --border-subtle: rgba(255,255,255,0.06);
            --border-strong: rgba(255,255,255,0.14);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-faint: #475569;
            --accent-1: #6366f1;
            --accent-2: #a855f7;
            --status-ok: #10b981;
            --shadow-soft: 0 2px 18px rgba(2,6,23,0.4);
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-image:
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.10) 0px, transparent 55%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.06) 0px, transparent 50%);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .chat-header-info {
            display: flex;
            gap: 2rem;
            align-items: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .chat-header-info span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 0.625rem 1.125rem;
            border-radius: 0.625rem;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.18s ease;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.03);
            color: var(--text-primary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 1rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 60%;
            padding: 1rem 1.25rem;
            border-radius: 0.875rem;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 0.9375rem;
        }

        .message.assistant .message-bubble {
            background: var(--bg-panel);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
            color: white;
            box-shadow: 0 4px 18px rgba(99,102,241,0.28);
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-faint);
            margin-top: 0.25rem;
            text-align: center;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 1rem;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            opacity: 0.5;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 0.75rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-subtle);
            border-top-color: var(--accent-1);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.16);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div>
                <h1 id="chat-title">Chat</h1>
                <div class="chat-header-info">
                    <span id="user-info">User</span>
                    <span id="message-count">0 messages</span>
                    <span id="last-activity">Last activity: —</span>
                </div>
            </div>
            <button class="back-btn" onclick="goBack()">← Back to Admin</button>
        </div>

        <div class="messages-container" id="messages-container">
            <div class="loading">
                <div class="spinner"></div>
                <span>Loading messages...</span>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = localStorage.getItem('api_key') || '1XteCCQ_s_UbrqOGEIYybmDBnokWhxYap90D6_Jojx8';

        async function loadChat() {
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('user_id');
            const projectId = params.get('project_id');
            const userName = params.get('user_name');

            if (!userId || !projectId) {
                showEmpty('Missing user or project ID');
                return;
            }

            try {
                // Load user detail
                const userRes = await fetch(`/v1/admin/users/${encodeURIComponent(userId)}/detail`, {
                    headers: { 'X-API-KEY': API_KEY }
                });
                const userDetail = await userRes.json();

                // Load messages
                const messagesRes = await fetch(
                    `/v1/admin/users/${encodeURIComponent(userId)}/messages?project_id=${encodeURIComponent(projectId)}`,
                    { headers: { 'X-API-KEY': API_KEY } }
                );
                const messages = await messagesRes.json();

                // Update header
                document.getElementById('chat-title').textContent = `${userName || 'User'} — Chat`;
                document.getElementById('user-info').textContent = `User: ${userName || userId}`;
                document.getElementById('message-count').textContent = `${messages.length} messages`;

                if (userDetail.last_message_at) {
                    const date = new Date(userDetail.last_message_at);
                    document.getElementById('last-activity').textContent =
                        `Last activity: ${date.toLocaleString()}`;
                }

                // Display messages
                displayMessages(messages);
            } catch (error) {
                console.error('Error loading chat:', error);
                showEmpty('Error loading messages');
            }
        }

        function displayMessages(messages) {
            const container = document.getElementById('messages-container');

            if (!messages || messages.length === 0) {
                showEmpty('No messages yet');
                return;
            }

            container.innerHTML = '';

            // Sort messages by date (oldest first)
            const sorted = [...messages].sort((a, b) =>
                new Date(a.created_at) - new Date(b.created_at)
            );

            sorted.forEach(msg => {
                const msgEl = document.createElement('div');
                msgEl.className = `message ${msg.role}`;

                const time = new Date(msg.created_at);
                const timeStr = time.toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                msgEl.innerHTML = `
                    <div>
                        <div class="message-bubble">${escapeHtml(msg.content)}</div>
                        <div class="message-time">${timeStr}</div>
                    </div>
                `;

                container.appendChild(msgEl);
            });

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function showEmpty(text) {
            const container = document.getElementById('messages-container');
            container.innerHTML = `
                <div class="empty-state">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                    <div>${text}</div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function goBack() {
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('project_id');
            const userId = params.get('user_id');

            // Go back to admin with user detail view
            window.location.href = `/admin.html?view=user&project=${projectId}&user=${userId}`;
        }

        // Load chat on page load
        loadChat();
    </script>
</body>
</html>
