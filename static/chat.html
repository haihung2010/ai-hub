<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020617">
    <title>AI Hub | Chat Viewer</title>
    <style>
        * { box-sizing: border-box; }

        :root {
            --bg-base: #020617;
            --bg-panel: rgba(30, 41, 59, 0.35);
            --bg-elevated: rgba(15, 23, 42, 0.65);
            --bg-input: #0b1224;
            --border-subtle: rgba(255,255,255,0.06);
            --border-strong: rgba(255,255,255,0.14);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --text-faint: #475569;
            --accent-1: #6366f1;
            --accent-2: #a855f7;
            --status-ok: #10b981;
            --shadow-soft: 0 2px 18px rgba(2,6,23,0.4);
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-image:
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.10) 0px, transparent 55%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.06) 0px, transparent 50%);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-header {
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .chat-header-info {
            display: flex;
            gap: 2rem;
            align-items: center;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .chat-header-info span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 0.625rem 1.125rem;
            border-radius: 0.625rem;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.18s ease;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.03);
            color: var(--text-primary);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
        }

        .msg-pair {
            display: grid;
            grid-template-columns: 3.5rem 1fr;
            gap: 0.1rem 0.6rem;
            padding: 0.5rem 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
            line-height: 1.5;
        }
        .msg-pair:hover { background: rgba(255,255,255,0.025); }
        .msg-pair .meta {
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.15rem;
            padding-top: 0.15rem;
        }
        .msg-pair .meta .time { font-size: 0.7rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .msg-pair .meta .idx { font-size: 0.6rem; color: var(--text-faint); }
        .msg-pair .user-line {
            font-size: 0.85rem;
            color: var(--text-strong);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .msg-pair .user-line::before { content: '▸ '; color: var(--accent-1); }
        .msg-pair .ai-line {
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-left: 0.8rem;
            color: #6ee7b7;
        }
        .msg-pair .ai-line::before { content: '↳ '; color: rgba(110,231,183,0.5); }
        .msg-pair .ai-line.no-reply { color: var(--text-faint); font-style: italic; }
        .date-divider {
            font-size: 0.7rem;
            color: var(--text-faint);
            padding: 0.5rem 0 0.2rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        /* Detail overlay */
        .detail-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .detail-overlay.active { display: flex; }
        .detail-panel {
            background: var(--bg-panel, #1a1a2e);
            border: 1px solid var(--border-subtle);
            border-radius: 0.75rem;
            max-width: 720px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.5rem;
        }
        .detail-panel .detail-section { margin-bottom: 1rem; }
        .detail-panel .detail-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.35rem; }
        .detail-panel .detail-label.user { color: var(--accent-1); }
        .detail-panel .detail-label.ai { color: #6ee7b7; }
        .detail-panel .detail-box {
            background: rgba(0,0,0,0.3);
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.85rem;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.6;
        }
        .detail-panel .detail-box.user { border-left: 3px solid var(--accent-1); }
        .detail-panel .detail-box.ai { border-left: 3px solid #6ee7b7; background: rgba(110,231,183,0.06); }
        .detail-panel .detail-close {
            display: block;
            margin: 0.75rem auto 0;
            padding: 0.4rem 1.5rem;
            border: 1px solid var(--border-subtle);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 1rem;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            opacity: 0.5;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 0.75rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-subtle);
            border-top-color: var(--accent-1);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.16);
        }

        .btn {
            background: var(--accent-1);
            color: white;
            border: 1px solid var(--accent-1);
            padding: 0.5rem 1.25rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.15s ease;
        }
        .btn:hover { background: #4f46e5; border-color: #4f46e5; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Master-detail chat viewer */
        .cv-header { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; background: rgba(15,23,42,0.55); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border-subtle); flex-shrink: 0; }
        .cv-header h1 { margin: 0; font-size: 1.1rem; font-weight: 700; }
        .cv-header .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-muted); }
        .cv-header .btn-icon { background: transparent; border: 1px solid var(--border-subtle); color: var(--text-secondary); width: 32px; height: 32px; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; display: inline-flex; align-items: center; justify-content: center; }
        .cv-header .btn-icon:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .cv-header .btn { background: var(--accent-1); color: white; border: 1px solid var(--accent-1); padding: 0.4rem 0.9rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.75rem; font-weight: 600; }
        .cv-header .btn:hover { background: #4f46e5; border-color: #4f46e5; }

        .cv-toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.75rem 1.5rem; background: rgba(15,23,42,0.4); border-bottom: 1px solid var(--border-subtle); align-items: center; flex-shrink: 0; }
        .cv-toolbar input, .cv-toolbar select { background: var(--bg-input); border: 1px solid var(--border-subtle); color: var(--text-primary); padding: 0.4rem 0.6rem; border-radius: 0.4rem; font-size: 0.75rem; font-family: inherit; }
        .cv-toolbar input:focus, .cv-toolbar select:focus { outline: none; border-color: var(--accent-1); }
        .cv-toolbar .select { min-width: 110px; }

        .cv-split { display: grid; grid-template-columns: minmax(380px, 40%) 1fr; height: calc(100vh - 80px - 64px - 56px); gap: 1px; background: var(--border-subtle); }
        .cv-list { overflow-y: auto; background: var(--bg-base); }
        .cv-detail { overflow-y: auto; background: var(--bg-base); padding: 1.25rem 1.5rem; }

        .cv-row { display: grid; grid-template-columns: 36px 80px 60px 60px 1fr 90px; gap: 0.5rem; align-items: center; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border-subtle); cursor: pointer; font-size: 0.8125rem; }
        .cv-row:hover { background: rgba(255,255,255,0.02); }
        .cv-row.selected { background: rgba(99,102,241,0.1); border-left: 2px solid var(--accent-1); }
        .cv-row .num { color: var(--text-faint); font-family: 'JetBrains Mono', monospace; }
        .cv-row .preview { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cv-row .when { color: var(--text-muted); font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; }
        .cv-row .role-pill { display: inline-block; padding: 0.125rem 0.4rem; font-size: 0.65rem; font-weight: 700; border-radius: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }

        .cv-turn { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border-subtle); }
        .cv-turn--system { opacity: 0.55; }
        .cv-turn-meta { display: flex; align-items: center; gap: 0.5rem; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.5rem; flex-wrap: wrap; }
        .cv-turn-meta .role { padding: 0.125rem 0.5rem; border-radius: 0.25rem; font-weight: 700; font-size: 0.65rem; letter-spacing: 0.05em; }
        .cv-turn-meta .role.user { background: rgba(99,102,241,0.15); color: #818cf8; }
        .cv-turn-meta .role.assistant { background: rgba(168,85,247,0.15); color: #c084fc; }
        .cv-turn-meta .role.system { background: rgba(148,163,184,0.15); color: var(--text-muted); }
        .cv-turn-body { padding: 0.75rem 1rem; background: var(--bg-elevated); border: 1px solid var(--border-subtle); border-radius: 0.5rem; line-height: 1.6; color: var(--text-primary); white-space: pre-wrap; word-break: break-word; }
        .cv-turn-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; opacity: 0; transition: opacity 0.15s; }
        .cv-turn:hover .cv-turn-actions { opacity: 1; }
        .cv-turn-actions button { background: transparent; border: 1px solid var(--border-subtle); color: var(--text-muted); padding: 0.25rem 0.625rem; border-radius: 0.375rem; font-size: 0.7rem; cursor: pointer; }
        .cv-turn-actions button:hover { background: var(--bg-elevated); color: var(--text-primary); }

        .cv-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-faint); padding: 2rem; text-align: center; }
    </style>
</head>
<body>
    <div class="chat-container">
        <header class="cv-header">
            <button class="btn-icon" onclick="goBack()" title="Back to admin">←</button>
            <div>
                <h1 id="chat-title">Loading...</h1>
                <p id="user-info" style="margin:0;font-size:0.75rem;color:var(--text-muted)"></p>
            </div>
            <span id="message-count" class="mono" style="margin-left:auto">0 / 0</span>
            <button class="btn" onclick="refreshList()">↻ Refresh</button>
        </header>

        <div class="cv-toolbar">
            <input id="filter-search" type="search" placeholder="Search message content..." style="flex:1;min-width:200px">
            <select id="filter-role" class="select"><option value="">All roles</option><option value="user">User</option><option value="assistant">Assistant</option><option value="system">System</option></select>
            <select id="filter-model" class="select"><option value="">All models</option></select>
            <input id="filter-from" type="date" title="From date">
            <input id="filter-to" type="date" title="To date">
            <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;font-family:'JetBrains Mono',monospace;color:var(--text-muted)"><input type="checkbox" id="show-system-cb"> show system</label>
            <button class="btn" onclick="applyFilters()">Apply</button>
        </div>

        <div class="cv-split">
            <aside class="cv-list" id="cv-list">
                <div class="cv-list-header" style="display:grid;grid-template-columns:36px 80px 60px 60px 1fr 90px;gap:0.5rem;padding:0.5rem 0.75rem;font-size:0.65rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border-subtle)">
                    <span>#</span><span>Role</span><span>Lat</span><span>Tok</span><span>Preview</span><span>When</span>
                </div>
                <div id="cv-rows"></div>
                <div id="cv-list-footer" style="padding:0.75rem;text-align:center">
                    <button id="load-more-btn" class="btn" onclick="loadMore()" style="display:none">Load more</button>
                </div>
            </aside>
            <section class="cv-detail" id="cv-detail">
                <div class="cv-empty">
                    <p>Select a message on the left to view its details.</p>
                </div>
            </section>
        </div>
    </div>

    <script>
        const API_KEY = localStorage.getItem('api_key') || '1XteCCQ_s_UbrqOGEIYybmDBnokWhxYap90D6_Jojx8';
        const PAGE_SIZE = 50;
        let allMessages = [];
        let totalCount = 0;
        let currentOffset = 0;
        let selectedId = null;
        let currentUserId = null;
        let currentProjectId = null;

        function escapeHtml(s) { return (s == null ? '' : String(s)).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

        function fmtTimeShort(iso) { try { return new Date(iso).toLocaleTimeString('en-GB', {hour: '2-digit', minute: '2-digit'}); } catch { return ''; } }
        function fmtDateShort(iso) { try { return new Date(iso).toLocaleDateString('en-GB', {day: '2-digit', month: 'short'}); } catch { return ''; } }
        function fmtRelative(iso) { if (!iso) return ''; const d = (Date.now() - new Date(iso).getTime()) / 1000; if (d < 60) return Math.floor(d) + 's ago'; if (d < 3600) return Math.floor(d/60) + 'm ago'; if (d < 86400) return Math.floor(d/3600) + 'h ago'; return Math.floor(d/86400) + 'd ago'; }

        function buildUrl(offset = 0) {
            const params = new URLSearchParams();
            params.set('project_id', currentProjectId);
            params.set('limit', PAGE_SIZE);
            params.set('offset', offset);
            const search = document.getElementById('filter-search').value.trim();
            if (search) params.set('search', search);
            const role = document.getElementById('filter-role').value;
            if (role) params.set('role', role);
            const model = document.getElementById('filter-model').value;
            if (model) params.set('model', model);
            const from = document.getElementById('filter-from').value;
            if (from) params.set('date_from', from);
            const to = document.getElementById('filter-to').value;
            if (to) params.set('date_to', to);
            return `/v1/admin/users/${encodeURIComponent(currentUserId)}/messages?${params.toString()}`;
        }

        async function api(path) {
            const r = await fetch(path, { headers: { 'X-API-KEY': API_KEY } });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
        }

        async function loadUserDetail() {
            try {
                const d = await api(`/v1/admin/users/${currentUserId}/detail`);
                const u = d.user;
                document.getElementById('chat-title').textContent = `${u.name} — Chat`;
                document.getElementById('user-info').textContent = `User: ${u.id.slice(0, 8)}… · Tenant: ${u.tenant_id} · Project: ${currentProjectId}`;
            } catch(e) { console.error(e); }
        }

        async function loadList(reset = true) {
            if (reset) {
                currentOffset = 0;
                allMessages = [];
                selectedId = null;
            }
            try {
                const res = await api(buildUrl(currentOffset));
                if (reset) {
                    allMessages = res;
                    totalCount = (res[0] && res[0].total_count) || 0;
                } else {
                    allMessages.push(...res);
                }
                renderList();
                updateCountDisplay();
                populateModelFilter(allMessages);
            } catch (e) {
                console.error('loadList failed', e);
            }
        }

        function populateModelFilter(messages) {
            const sel = document.getElementById('filter-model');
            const current = sel.value;
            const models = [...new Set(messages.map(m => m.model).filter(Boolean))].sort();
            sel.innerHTML = '<option value="">All models</option>' +
                models.map(m => `<option value="${escapeHtml(m)}" ${m === current ? 'selected' : ''}>${escapeHtml(m)}</option>`).join('');
        }

        function renderList() {
            const showSystem = document.getElementById('show-system-cb').checked;
            const filtered = showSystem ? allMessages : allMessages.filter(m => m.role !== 'system');
            const container = document.getElementById('cv-rows');
            container.innerHTML = filtered.map((m, i) => {
                const totalTokens = (m.prompt_tokens || 0) + (m.completion_tokens || 0);
                return `
                <div class="cv-row ${selectedId === m.id ? 'selected' : ''}" data-id="${escapeHtml(m.id)}" onclick="selectMessage('${escapeHtml(m.id)}')">
                    <span class="num">${i + 1}</span>
                    <span class="role-pill role-${m.role}">${m.role}</span>
                    <span>${m.latency_ms ? (Math.round(m.latency_ms/100)/10).toFixed(1) + 's' : '–'}</span>
                    <span>${totalTokens || '–'}</span>
                    <span class="preview">${escapeHtml((m.content || '').slice(0, 80))}</span>
                    <span class="when" title="${escapeHtml(m.created_at)}">${fmtTimeShort(m.created_at)}</span>
                </div>`;
            }).join('');
            document.getElementById('load-more-btn').style.display = allMessages.length < totalCount ? '' : 'none';
        }

        function updateCountDisplay() {
            const showSystem = document.getElementById('show-system-cb').checked;
            const filtered = showSystem ? allMessages : allMessages.filter(m => m.role !== 'system');
            document.getElementById('message-count').textContent = `${filtered.length} of ${totalCount}`;
        }

        function selectMessage(id) {
            selectedId = id;
            renderList();
            const m = allMessages.find(x => x.id === id);
            if (!m) return;
            const totalTokens = (m.prompt_tokens || 0) + (m.completion_tokens || 0);
            const cost = m.cost_usd != null ? `$${Number(m.cost_usd).toFixed(6)}` : '–';
            const detail = document.getElementById('cv-detail');
            detail.innerHTML = `
                <div class="cv-turn cv-turn--${m.role}">
                    <div class="cv-turn-meta">
                        <span class="role ${m.role}">${m.role}</span>
                        <span>${fmtDateShort(m.created_at)} ${fmtTimeShort(m.created_at)}</span>
                        <span>${fmtRelative(m.created_at)}</span>
                        <span>·</span>
                        <span>${escapeHtml(m.model || '?')}</span>
                        <span>·</span>
                        <span>${m.latency_ms ? (m.latency_ms/1000).toFixed(2) + 's' : '–'}</span>
                        <span>·</span>
                        <span>${totalTokens} tok (${m.prompt_tokens || 0}→${m.completion_tokens || 0})</span>
                        <span>·</span>
                        <span>${cost}</span>
                        <span>·</span>
                        <span>${m.is_summarized ? 'summarized' : ''}</span>
                    </div>
                    <div class="cv-turn-body">${escapeHtml(m.content || '').replace(/\n/g, '<br>')}</div>
                    <div class="cv-turn-actions">
                        <button onclick="copyContent('${escapeHtml(m.id)}')">⤴ Copy</button>
                        <button onclick="viewRaw('${escapeHtml(m.id)}')">⤵ Raw JSON</button>
                    </div>
                </div>`;
        }

        function copyContent(id) {
            const m = allMessages.find(x => x.id === id);
            if (m && navigator.clipboard) navigator.clipboard.writeText(m.content || '').then(() => {});
        }

        function viewRaw(id) {
            const m = allMessages.find(x => x.id === id);
            if (!m) return;
            const detail = document.getElementById('cv-detail');
            detail.innerHTML = `<pre style="background:var(--bg-elevated);padding:1rem;border-radius:0.5rem;overflow:auto;font-size:0.75rem;color:var(--text-muted);border:1px solid var(--border-subtle)">${escapeHtml(JSON.stringify(m, null, 2))}</pre>
                <button class="btn" onclick="selectMessage('${escapeHtml(m.id)}')" style="margin-top:1rem">← Back to thread</button>`;
        }

        function applyFilters() {
            loadList(true);
        }

        function loadMore() {
            currentOffset = allMessages.length;
            loadList(false);
        }

        function refreshList() {
            loadList(true);
        }

        function goBack() {
            window.history.back();
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'j' || e.key === 'k') {
                const rows = document.querySelectorAll('.cv-row');
                if (!rows.length) return;
                const idx = Array.from(rows).findIndex(r => r.classList.contains('selected'));
                const next = e.key === 'j' ? Math.max(0, idx - 1) : Math.min(rows.length - 1, idx + 1);
                rows[next]?.click();
                rows[next]?.scrollIntoView({ block: 'nearest' });
            }
        });

        document.getElementById('show-system-cb').addEventListener('change', () => { renderList(); updateCountDisplay(); });

        // init
        const url = new URLSearchParams(window.location.search);
        currentUserId = url.get('user_id');
        currentProjectId = url.get('project_id') || '';
        if (currentUserId) {
            loadUserDetail();
            loadList(true);
        } else {
            document.getElementById('chat-title').textContent = 'Missing user_id';
        }
    </script>
</body>
</html>
