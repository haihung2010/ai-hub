<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub | Admin</title>
    <link rel="stylesheet" href="/admin2.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app-shell">

    <!-- ===== Header ===== -->
    <header class="app-header">
        <div class="header-brand">
            <div class="header-brand-icon">
                <svg width="18" height="18" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <div>
                <div class="header-brand-name">AI HUB</div>
                <div class="header-brand-sub">ADMIN</div>
            </div>
        </div>

        <nav class="header-tabs">
            <button class="tab-btn active" data-tab="keys">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                Keys
            </button>
            <button class="tab-btn" data-tab="knowledge">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13"/></svg>
                RAG Knowledge
            </button>
            <button class="tab-btn" data-tab="chat">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                Chat Audit
            </button>
            <button class="tab-btn" data-tab="gpu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/></svg>
                GPU
            </button>
            <button class="tab-btn" data-tab="system">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                System
            </button>
        </nav>

        <div class="header-right">
            <button class="btn btn-ghost btn-sm" id="live-btn">
                <span id="live-dot" style="width:7px;height:7px;border-radius:50%;background:var(--status-ok);display:inline-block"></span>
                LIVE: ON
            </button>
            <button class="btn btn-ghost btn-sm" id="api-key-btn">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                <span id="api-key-label">Set Key</span>
            </button>
        </div>
    </header>

    <!-- ===== Main Content ===== -->
    <main class="app-main">

        <!-- ===== KEYS TAB ===== -->
        <section id="tab-keys" class="tab-section active">
            <div class="two-col">
                <!-- Create form -->
                <div class="glass-panel">
                    <div class="section-title" style="margin-bottom:1rem">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Mint Access Key
                    </div>
                    <div class="form-stack">
                        <input id="key-name" type="text" class="input" placeholder="Key label (e.g. mobile-prod)">
                        <input id="key-tenant" type="text" class="input" placeholder="Tenant / Project ID" value="default">
                        <div class="form-row">
                            <input id="key-rpm" type="number" class="input" placeholder="RPM" value="60" style="flex:1">
                            <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.75rem;color:var(--text-muted);cursor:pointer;white-space:nowrap">
                                <span class="toggle"><input id="key-admin" type="checkbox"><span class="toggle-track"></span></span>
                                Admin
                            </label>
                        </div>
                        <button class="btn btn-primary" onclick="createKey()">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Create Key
                        </button>
                    </div>
                </div>

                <!-- Keys table -->
                <div class="glass-panel">
                    <div class="panel-header">
                        <div class="section-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                            Access Keys
                        </div>
                        <button class="btn btn-ghost btn-sm" onclick="loadKeys()">
                            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                            Refresh
                        </button>
                    </div>
                    <div id="keys-table"></div>
                </div>
            </div>

            <!-- Sessions -->
            <div class="glass-panel" style="margin-top:1.25rem">
                <div class="panel-header">
                    <div class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                        Active Sessions
                    </div>
                </div>
                <div id="sessions-table"></div>
            </div>
        </section>

        <!-- ===== KNOWLEDGE TAB ===== -->
        <section id="tab-knowledge" class="tab-section">
            <div class="two-col">
                <!-- Upload form -->
                <div class="glass-panel">
                    <div class="section-title" style="margin-bottom:1rem">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        Vectorize Content
                    </div>
                    <div class="form-stack">
                        <input id="rag-project" type="text" class="input" placeholder="Project ID (e.g. default)">
                        <input id="rag-title" type="text" class="input" placeholder="Card title">
                        <select id="rag-domain" class="select">
                            <option value="general">General</option>
                            <option value="medical">Medical</option>
                            <option value="legal">Legal</option>
                            <option value="finance">Finance</option>
                            <option value="tech">Tech</option>
                            <option value="science">Science</option>
                        </select>
                        <textarea id="rag-content" class="textarea" placeholder="Knowledge content..."></textarea>
                        <button class="btn btn-success" onclick="uploadRag()">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            Index Card
                        </button>
                    </div>
                </div>

                <!-- Cards table -->
                <div class="glass-panel">
                    <div class="panel-header">
                        <div class="section-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0018 0V5"/><path d="M3 12a9 3 0 0018 0"/></svg>
                            Knowledge Cards
                        </div>
                        <button class="btn btn-ghost btn-sm" onclick="loadKnowledge()">Refresh</button>
                    </div>
                    <div id="rag-table"></div>
                </div>
            </div>
        </section>

        <!-- ===== CHAT TAB ===== -->
        <section id="tab-chat" class="tab-section">
            <div class="chat-layout">
                <div class="glass-panel chat-sidebar" id="chat-sidebar">
                    <div class="section-title" style="margin-bottom:0.75rem">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                        Users
                    </div>
                    <select id="chat-tenant" class="select" style="margin-bottom:0.75rem;font-size:0.75rem" onchange="loadChatUsers()">
                        <option value="">Select tenant/project...</option>
                    </select>
                    <div class="chat-user-toolbar">
                        <input id="chat-user-search" class="input" placeholder="Search user..." style="font-size:0.7rem;padding:0.4rem 0.6rem;margin-bottom:0.5rem" oninput="renderChatUsers()">
                        <select id="chat-user-sort" class="select" style="font-size:0.7rem;padding:0.4rem 0.6rem;margin-bottom:0.5rem" onchange="renderChatUsers()">
                            <option value="recent">Recent first</option>
                            <option value="oldest">Oldest first</option>
                            <option value="msgs_desc">Most msgs</option>
                            <option value="msgs_asc">Fewest msgs</option>
                            <option value="name_asc">Name A→Z</option>
                            <option value="name_desc">Name Z→A</option>
                        </select>
                    </div>
                    <div id="chat-users" class="chat-user-list" style="gap:0.5rem;margin-bottom:0"></div>
                </div>
                <div class="glass-panel chat-main" id="chat-main-panel">
                    <div class="section-title chat-panel-title" style="margin-bottom:0.75rem">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                        Select a user
                    </div>
                    <div id="chat-pairs" class="chat-pairs"></div>
                </div>
            </div>
        </section>

        <!-- ===== GPU TAB ===== -->
        <section id="tab-gpu" class="tab-section">
            <div class="gpu-grid" id="gpu-cards"></div>
            <div class="glass-panel">
                <div class="panel-header">
                    <div class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                        GPU Utilization
                    </div>
                </div>
                <div class="chart-wrap" style="height:200px"><canvas id="gpu-chart"></canvas></div>
            </div>
        </section>

        <!-- ===== SYSTEM TAB ===== -->
        <section id="tab-system" class="tab-section">
            <div class="glass-panel" style="margin-bottom:1.25rem">
                <div class="panel-header">
                    <div class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/></svg>
                        Provider Health
                    </div>
                    <button class="btn btn-ghost btn-sm" onclick="loadHealth()">Refresh</button>
                </div>
                <div id="health-grid" class="health-grid"></div>
            </div>
            <div class="glass-panel">
                <div class="panel-header">
                    <div class="section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        Latency Distribution
                    </div>
                </div>
                <div class="chart-wrap" style="height:180px"><canvas id="latency-chart"></canvas></div>
            </div>
        </section>

    </main>
</div>

<!-- Modal -->
<div id="modal-root"></div>

<!-- Toast -->
<div class="toast-stack" id="toast-stack"></div>

<script>
/* ================================================================
   ADMIN2 — Clean Admin JS
   ================================================================ */

const A2 = {
    apiKey: localStorage.getItem('a2_apikey') || '',
    live: true,
    liveTimer: null,
    gpuChart: null,
    latencyChart: null,
    gpuHistory: { util: [], temp: [], vram: [], labels: [] },
    MAX_GPU: 60,
};

/* ---- API helper ---- */
function api(path, opts = {}) {
    const headers = { 'X-API-KEY': A2.apiKey };
    if (!(opts.body instanceof FormData)) headers['Content-Type'] = 'application/json';
    return fetch(path, {
        method: opts.method || 'GET',
        headers,
        body: opts.body instanceof FormData ? opts.body
            : opts.body ? JSON.stringify(opts.body) : undefined,
    }).then(async r => {
        if (r.status === 204) return null;
        const j = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(j.detail || `HTTP ${r.status}`);
        return j;
    });
}

/* ---- Toast ---- */
function toast(msg, type = 'info') {
    const stack = document.getElementById('toast-stack');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    stack.appendChild(el);
    setTimeout(() => el.remove(), 4100);
}

/* ---- Modal ---- */
function openModal({ title, desc, content, confirmText = 'OK', cancelText = 'Cancel', danger = false, onConfirm }) {
    const root = document.getElementById('modal-root');
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
        <div class="modal-card">
            <div class="modal-title">${title}</div>
            ${desc ? `<div class="modal-desc">${desc}</div>` : ''}
            ${content ? `<div class="modal-content">${content}</div>` : ''}
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal()">${cancelText}</button>
                <button class="btn ${danger ? 'btn-danger' : 'btn-primary'}" id="modal-confirm-btn">${confirmText}</button>
            </div>
        </div>`;
    root.appendChild(overlay);
    overlay.querySelector('#modal-confirm-btn').onclick = async () => {
        const result = onConfirm ? await onConfirm() : true;
        if (result !== false) closeModal();
    };
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    return overlay;
}

function closeModal() {
    const m = document.getElementById('modal-root');
    if (m.lastChild) m.lastChild.remove();
}

function previewModal(title, content) {
    return openModal({ title, content, confirmText: 'Close', cancelText: '', onConfirm: () => true });
}

/* ---- API Key ---- */
function promptApiKey() {
    openModal({
        title: 'Enter API Key',
        content: `<input id="modal-apikey" class="input" type="text" placeholder="ah_..." value="${A2.apiKey}" style="width:100%">`,
        confirmText: 'Save',
        onConfirm: () => {
            const v = document.getElementById('modal-apikey').value.trim();
            if (!v) return toast('Key required', 'err');
            A2.apiKey = v;
            localStorage.setItem('a2_apikey', v);
            updateApiKeyLabel();
            toast('API key saved', 'ok');
            refreshCurrentTab();
        },
    });
    setTimeout(() => document.getElementById('modal-apikey')?.focus(), 50);
}

function updateApiKeyLabel() {
    const el = document.getElementById('api-key-label');
    if (!el) return;
    el.textContent = A2.apiKey ? '••••' + A2.apiKey.slice(-4) : 'Set Key';
}

/* ---- LIVE Toggle ---- */
function toggleLive() {
    A2.live = !A2.live;
    const btn = document.getElementById('live-btn');
    btn.innerHTML = `<span id="live-dot" style="width:7px;height:7px;border-radius:50%;background:${A2.live ? 'var(--status-ok)' : 'var(--text-faint)'};display:inline-block"></span>LIVE: ${A2.live ? 'ON' : 'OFF'}`;
    if (A2.live) {
        A2.liveTimer = setInterval(() => { if (A2.currentTab === 'gpu') loadGpu(); }, 2000);
        loadGpu();
    } else {
        clearInterval(A2.liveTimer);
    }
}

function startLive() {
    A2.live = true;
    const btn = document.getElementById('live-btn');
    btn.innerHTML = `<span id="live-dot" style="width:7px;height:7px;border-radius:50%;background:var(--status-ok);display:inline-block"></span>LIVE: ON`;
    A2.liveTimer = setInterval(() => { if (A2.currentTab === 'gpu') loadGpu(); }, 2000);
}

/* ---- Tab Navigation ---- */
A2.currentTab = 'keys';

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
        document.querySelectorAll('.tab-section').forEach(s => s.classList.toggle('active', s.id === 'tab-' + tab));
        A2.currentTab = tab;
        if (!A2.initializedTabs) A2.initializedTabs = new Set();
        if (!A2.initializedTabs.has(tab)) {
            A2.initializedTabs.add(tab);
            initTab(tab);
        }
    });
});

function refreshCurrentTab() { initTab(A2.currentTab); }

function initTab(tab) {
    if (tab === 'keys') { loadKeys(); loadSessions(); }
    else if (tab === 'knowledge') { loadKnowledge(); }
    else if (tab === 'chat') { loadChatTenants(); }
    else if (tab === 'gpu') { loadGpu(); initGpuChart(); }
    else if (tab === 'system') { loadHealth(); initLatencyChart(); }
}

/* ================================================================
   KEYS TAB
   ================================================================ */
async function loadKeys() {
    const host = document.getElementById('keys-table');
    if (!A2.apiKey) { host.innerHTML = dtEmpty('No API key set', 'Set your key in the header'); return; }
    host.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-muted)"><span class="spinner"></span></div>';
    try {
        const rows = await api('/v1/admin/management/keys');
        if (!rows.length) { host.innerHTML = dtEmpty('No keys', 'Mint one with the form on the left'); return; }
        const cols = [
            { key: 'name', label: 'Name' },
            { key: 'tenant_id', label: 'Tenant' },
            { key: 'rpm_limit', label: 'RPM', format: v => `<span class="mono">${v}</span>` },
            { key: 'monthly_budget_usd', label: 'Budget', format: v => v ? `$${Number(v).toFixed(2)}` : '—' },
            { key: 'is_admin', label: 'Admin', format: v => v ? '<span style="color:var(--status-ok)">✓</span>' : '—' },
            { key: 'enabled', label: 'Status', format: v => v ? '<span style="color:var(--status-ok)">Active</span>' : '<span style="color:var(--status-err)">Disabled</span>' },
            {
                key: 'id', label: 'Actions', sortable: false,
                format: (v, r) => `<div style="display:flex;gap:0.35rem">
                    <button class="btn btn-ghost btn-sm" onclick="toggleKey(${v}, ${!r.enabled})">${r.enabled ? 'Disable' : 'Enable'}</button>
                    <button class="btn btn-ghost btn-sm" style="color:var(--status-err)" onclick="deleteKey(${v})">Delete</button>
                </div>`,
            },
        ];
        mountDt(host, cols, rows);
    } catch (e) { host.innerHTML = dtEmpty('Error', e.message); }
}

async function createKey() {
    const name = document.getElementById('key-name').value.trim();
    const tenant = document.getElementById('key-tenant').value.trim() || 'default';
    const rpm = parseInt(document.getElementById('key-rpm').value) || 60;
    const admin = document.getElementById('key-admin').checked;
    if (!name) return toast('Key name required', 'err');
    try {
        const result = await api('/v1/admin/keys', { method: 'POST', body: { name, tenant_id: tenant, is_admin: admin, rpm_limit: rpm } });
        toast('Key created: ' + result.key.slice(0, 20) + '...', 'ok');
        openModal({
            title: 'New API Key (shown once)',
            content: `<div class="mono" style="background:var(--bg-input);padding:0.75rem;border-radius:0.5rem;font-size:0.8rem;word-break:break-all;color:var(--status-ok)">${result.key}</div>`,
            confirmText: 'Copy', onConfirm: () => { navigator.clipboard?.writeText(result.key); toast('Copied', 'ok'); },
        });
        document.getElementById('key-name').value = '';
        loadKeys();
    } catch (e) { toast('Error: ' + e.message, 'err'); }
}

async function toggleKey(id, enable) {
    try {
        await api(`/v1/admin/keys/${id}`, { method: 'PATCH', body: { enabled: enable } });
        toast(`Key ${enable ? 'enabled' : 'disabled'}`, 'ok');
        loadKeys();
    } catch (e) { toast('Error: ' + e.message, 'err'); }
}

async function deleteKey(id) {
    openModal({
        title: 'Delete Key?',
        desc: 'This cannot be undone.',
        confirmText: 'Delete', danger: true,
        onConfirm: async () => {
            await api(`/v1/admin/keys/${id}`, { method: 'DELETE' });
            toast('Key deleted', 'ok');
            loadKeys();
        },
    });
}

async function loadSessions() {
    const host = document.getElementById('sessions-table');
    try {
        const rows = await api('/v1/admin/management/sessions');
        if (!rows.length) { host.innerHTML = dtEmpty('No active sessions'); return; }
        const cols = [
            { key: 'user_name', label: 'User' },
            { key: 'project_id', label: 'Project' },
            { key: 'message_count', label: 'Messages', format: v => `<span class="mono">${v}</span>` },
            { key: 'last_active', label: 'Last Active', format: v => v ? new Date(v).toLocaleString() : '—' },
        ];
        mountDt(host, cols, rows.slice(0, 50));
    } catch (e) { host.innerHTML = dtEmpty('Error', e.message); }
}

/* ================================================================
   KNOWLEDGE TAB
   ================================================================ */
async function loadKnowledge() {
    const host = document.getElementById('rag-table');
    if (!A2.apiKey) { host.innerHTML = dtEmpty('No API key', 'Set your key in the header'); return; }
    try {
        const rows = await api('/v1/admin/knowledge/cards');
        if (!rows.length) { host.innerHTML = dtEmpty('No cards', 'Upload one with the form on the left'); return; }
        const cols = [
            { key: 'project_id', label: 'Project' },
            { key: 'title', label: 'Title', search: true },
            { key: 'domain', label: 'Domain' },
            { key: 'chunk_count', label: 'Chunks', format: v => `<span class="mono">${v}</span>` },
            { key: 'created_at', label: 'Created', format: v => v ? new Date(v).toLocaleDateString() : '—' },
            {
                key: 'id', label: 'Actions', sortable: false,
                format: (v) => `<button class="btn btn-ghost btn-sm" style="color:var(--status-err)" onclick="deleteCard(${v})">Delete</button>`,
            },
        ];
        mountDt(host, cols, rows);
    } catch (e) { host.innerHTML = dtEmpty('Error', e.message); }
}

async function uploadRag() {
    const project = document.getElementById('rag-project').value.trim() || 'default';
    const title = document.getElementById('rag-title').value.trim();
    const domain = document.getElementById('rag-domain').value;
    const content = document.getElementById('rag-content').value.trim();
    if (!title || !content) return toast('Title and content required', 'err');
    try {
        await api('/v1/admin/knowledge/upload', {
            method: 'POST',
            body: { project_id: project, title, domain, content, tags: [] },
        });
        toast('Card indexed', 'ok');
        document.getElementById('rag-title').value = '';
        document.getElementById('rag-content').value = '';
        loadKnowledge();
    } catch (e) { toast('Error: ' + e.message, 'err'); }
}

async function deleteCard(id) {
    openModal({ title: 'Delete Card?', desc: 'This removes the card and all its chunks.', confirmText: 'Delete', danger: true, onConfirm: async () => {
        await api(`/v1/admin/knowledge/cards/${id}`, { method: 'DELETE' });
        toast('Card deleted', 'ok');
        loadKnowledge();
    }});
}

/* ================================================================
   CHAT TAB
   ================================================================ */
async function loadChatTenants() {
    const sel = document.getElementById('chat-tenant');
    try {
        const tenants = await api('/v1/admin/tenants');
        sel.innerHTML = '<option value="">Select tenant/project...</option>' +
            tenants.map(t => `<option value="${t.project_id}">${t.project_id} (${t.user_count || 0} users)</option>`).join('');
        if (tenants.length === 1) { sel.value = tenants[0].project_id; loadChatUsers(); }
    } catch (e) { toast('Failed to load tenants: ' + e.message, 'err'); }
}

async function loadChatUsers() {
    const projectId = document.getElementById('chat-tenant').value;
    const usersEl = document.getElementById('chat-users');
    const pairsEl = document.getElementById('chat-pairs');
    usersEl.innerHTML = '';
    pairsEl.innerHTML = '';
    if (!projectId) return;
    usersEl.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--text-muted)"><span class="spinner"></span></div>';
    try {
        const users = await api(`/v1/admin/tenants/${encodeURIComponent(projectId)}/users?limit=40`);
        window._allChatUsers = users;
        renderChatUsers();
    } catch (e) { usersEl.innerHTML = `<div style="color:var(--status-err);font-size:0.875rem">${escHtml(e.message)}</div>`; }
}

function renderChatUsers() {
    const usersEl = document.getElementById('chat-users');
    const allUsers = window._allChatUsers || [];
    const search = document.getElementById('chat-user-search')?.value?.toLowerCase() || '';
    const sort = document.getElementById('chat-user-sort')?.value || 'recent';
    let filtered = allUsers.filter(u => (u.name || '').toLowerCase().includes(search));
    if (sort === 'recent') filtered.sort((a, b) => new Date(b.last_message_at || 0) - new Date(a.last_message_at || 0));
    else if (sort === 'oldest') filtered.sort((a, b) => new Date(a.last_message_at || 0) - new Date(b.last_message_at || 0));
    else if (sort === 'msgs_desc') filtered.sort((a, b) => (b.message_count || 0) - (a.message_count || 0));
    else if (sort === 'msgs_asc') filtered.sort((a, b) => (a.message_count || 0) - (b.message_count || 0));
    else if (sort === 'name_asc') filtered.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    else if (sort === 'name_desc') filtered.sort((a, b) => (b.name || '').localeCompare(a.name || ''));
    if (!filtered.length) { usersEl.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;text-align:center;padding:0.5rem">No users found</div>'; return; }
    usersEl.innerHTML = filtered.map(u => {
        const color = avatarColor(u.name || u.id);
        return `<div class="chat-user-card ${color}" data-id="${escHtml(u.id)}">
            <div class="chat-user-avatar ${color}">${initials(u.name || '?')}</div>
            <div>
                <div class="chat-user-name">${escHtml(u.name || 'Unknown')}</div>
                <div class="chat-user-meta">${u.message_count || 0} msgs · ${u.last_message_at ? timeShort(u.last_message_at) : 'never'}</div>
            </div>
        </div>`;
    }).join('');
    document.querySelectorAll('#chat-users .chat-user-card').forEach(card => {
        card.addEventListener('click', () => {
            document.querySelectorAll('.chat-user-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            const id = card.getAttribute('data-id');
            const user = filtered.find(x => x.id === id);
            loadChatPairs(id, user?.name || '');
        }, { once: false });
    });
}

async function loadChatPairs(userId, userName) {
    const projectId = document.getElementById('chat-tenant').value;
    const pairsEl = document.getElementById('chat-pairs');
    const mainPanel = document.getElementById('chat-main-panel');
    mainPanel.querySelector('.section-title').innerHTML = `
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        Chat · ${escHtml(userName || userId)}`;
    pairsEl.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-muted)"><span class="spinner"></span></div>';
    try {
        const msgs = await api(`/v1/admin/users/${userId}/messages?project_id=${encodeURIComponent(projectId)}`);
        const pairs = buildPairs(msgs);
        if (!pairs.length) { pairsEl.innerHTML = '<div style="color:var(--text-muted);font-size:0.875rem">No messages found</div>'; return; }
        pairsEl.innerHTML = pairs.map((p, i) => `
            <div class="chat-pair" id="cp-${i}" onclick="toggleChatDetail(${i})">
                <div class="chat-pair-header">
                    <div class="chat-pair-time">${timeShort(p.time)}</div>
                    ${p.summarized ? '<span class="chat-pair-badge">SUM</span>' : ''}
                    <svg class="chat-pair-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;margin-left:auto;transition:transform 0.2s"><path d="M6 9l6 6 6-6"/></svg>
                </div>
                <div class="chat-pair-preview">
                    <div class="chat-pair-req" title="${escHtml(p.req)}">▸ ${escHtml(trunc(p.req, 240))}</div>
                    <div class="chat-pair-resp">↳ ${escHtml(trunc(p.resp || 'no reply', 160))}</div>
                </div>
                <div class="chat-pair-detail" style="display:none">
                    <div class="chat-pair-fullreq"><span class="chat-pair-role">USER</span><pre>${escHtml(p.req)}</pre></div>
                    ${p.resp ? `<div class="chat-pair-fullresp"><span class="chat-pair-role">ASSISTANT</span><pre>${escHtml(p.resp)}</pre></div>` : ''}
                </div>
            </div>`).join('');
        window._chatPairs = pairs;
    } catch (e) { pairsEl.innerHTML = `<div style="color:var(--status-err);font-size:0.875rem">${escHtml(e.message)}</div>`; }
}

function toggleChatDetail(idx) {
    const el = document.getElementById('cp-' + idx);
    if (!el) return;
    const detail = el.querySelector('.chat-pair-detail');
    const chevron = el.querySelector('.chat-pair-chevron');
    const isOpen = detail.style.display !== 'none';
    detail.style.display = isOpen ? 'none' : 'block';
    chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
}

function showChatDetail(idx) {
    const p = window._chatPairs[idx];
    if (!p) return;
    previewModal(`Chat · ${timeShort(p.time)}`, `REQUEST:\n${p.req}\n\nRESPONSE:\n${p.resp || '(no reply)'}`);
}

function buildPairs(msgs) {
    const sorted = [...msgs].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
    const pairs = [];
    for (let i = 0; i < sorted.length; i++) {
        if (sorted[i].role !== 'user') continue;
        const next = sorted[i + 1];
        pairs.push({
            time: sorted[i].created_at,
            req: sorted[i].content || '',
            resp: (next && next.role === 'assistant') ? (next.content || '') : '',
            summarized: !!sorted[i].is_summarized,
        });
    }
    return pairs;
}

/* ================================================================
   GPU TAB
   ================================================================ */
async function loadGpu() {
    const cardsEl = document.getElementById('gpu-cards');
    try {
        const data = await api('/v1/admin/gpu/stats');
        if (!data.gpus || !data.gpus.length) { cardsEl.innerHTML = '<div class="glass-panel" style="text-align:center;color:var(--text-muted);padding:2rem">No GPU data</div>'; return; }
        cardsEl.innerHTML = data.gpus.map(g => {
            const utilPct = g.utilization ?? 0;
            const memPct = g.memory_total ? (g.memory_used / g.memory_total * 100) : 0;
            return `<div class="gpu-card">
                <div class="gpu-card-name">${escHtml(g.name || `GPU ${g.index}`)}</div>
                <div class="gpu-card-metrics">
                    <div class="gpu-metric"><div class="gpu-metric-val" style="color:${utilPct > 80 ? 'var(--status-warn)' : 'var(--status-ok)'}">${utilPct.toFixed(0)}%</div><div class="gpu-metric-label">Util</div></div>
                    <div class="gpu-metric"><div class="gpu-metric-val">${g.temperature || 0}°</div><div class="gpu-metric-label">Temp</div></div>
                    <div class="gpu-metric"><div class="gpu-metric-val" style="color:${memPct > 80 ? 'var(--status-warn)' : 'var(--status-ok)'}">${memPct.toFixed(0)}%</div><div class="gpu-metric-label">VRAM</div></div>
                </div>
                <div class="gpu-bar"><div class="gpu-bar-fill" style="width:${utilPct}%;background:${utilPct > 80 ? 'var(--status-warn)' : 'var(--accent-1)'}"></div></div>
                <div style="font-size:0.6875rem;color:var(--text-faint);margin-top:0.4rem;font-family:'JetBrains Mono',monospace">${(g.memory_used/1024).toFixed(1)} / ${(g.memory_total/1024).toFixed(1)} GB</div>
            </div>`;
        }).join('');

        // Update GPU sparkline
        const now = new Date().toLocaleTimeString();
        A2.gpuHistory.labels.push(now);
        A2.gpuHistory.util.push(data.gpus[0]?.utilization ?? 0);
        A2.gpuHistory.temp.push(data.gpus[0]?.temperature ?? 0);
        A2.gpuHistory.vram.push(data.gpus[0] ? (data.gpus[0].memory_used / data.gpus[0].memory_total * 100) : 0);
        if (A2.gpuHistory.labels.length > A2.MAX_GPU) {
            A2.gpuHistory.labels.shift(); A2.gpuHistory.util.shift(); A2.gpuHistory.temp.shift(); A2.gpuHistory.vram.shift();
        }
        updateGpuChart();
    } catch (e) { cardsEl.innerHTML = `<div class="glass-panel" style="text-align:center;color:var(--status-err);padding:2rem">${e.message}</div>`; }
}

function initGpuChart() {
    if (A2.gpuChart) return;
    const ctx = document.getElementById('gpu-chart');
    if (!ctx) return;
    A2.gpuChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'Util %', data: [], borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.08)', borderWidth: 2, tension: 0.4, fill: true, pointRadius: 0 },
                { label: 'VRAM %', data: [], borderColor: '#a855f7', backgroundColor: 'transparent', borderWidth: 2, tension: 0.4, fill: false, pointRadius: 0 },
            ],
        },
        options: {
            responsive: true, maintainAspectRatio: false, animation: false,
            plugins: { legend: { display: true, position: 'top', labels: { color: '#64748b', font: { size: 10 }, boxWidth: 12 } } },
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#475569', font: { size: 10 }, callback: v => v + '%' }, min: 0, max: 100 },
                x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 9 }, maxTicksLimit: 10 } },
            },
        },
    });
}

function updateGpuChart() {
    if (!A2.gpuChart) return;
    A2.gpuChart.data.labels = A2.gpuHistory.labels;
    A2.gpuChart.data.datasets[0].data = A2.gpuHistory.util;
    A2.gpuChart.data.datasets[1].data = A2.gpuHistory.vram;
    A2.gpuChart.update('none');
}

    const grid = document.getElementById('health-grid');

                <div class="health-card-name">${escHtml(p.name)}</div>
                <div class="health-card-detail">${escHtml(p.base_url || 'not configured')}</div>
                <div class="health-card-latency">${ok ? '● Online' : '✕ Offline'}</div>
            </div>`;
        }).join('');

function initLatencyChart() {
    if (A2.latencyChart) return;
    const ctx = document.getElementById('latency-chart');
    if (!ctx) return;
    // Load recent usage stats for latency distribution
    api('/v1/admin/stats').then(data => {
        if (!data?.latency_histogram) return;
        const buckets = Object.entries(data.latency_histogram).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
        A2.latencyChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: buckets.map(([k]) => `${k}ms`),
                datasets: [{ label: 'Requests', data: buckets.map(([, v]) => v), backgroundColor: 'rgba(99,102,241,0.6)', borderRadius: 4 }],
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#475569', font: { size: 10 } } },
                    x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 9 } } },
                },
            },
        });
    }).catch(() => {});
}

/* ================================================================
   DataTable (lightweight)
   ================================================================ */
function mountDt(host, cols, rows) {
    const tableId = 'dt-' + Math.random().toString(36).slice(2);
    host.innerHTML = `<div id="${tableId}"></div>`;
    const container = document.getElementById(tableId);

    // Build search
    const searchId = tableId + '-search';
    let filter = '';
    container.innerHTML = `
        <div class="dt-toolbar">
            <input id="${searchId}" class="input dt-search" placeholder="Search..." style="font-size:0.75rem">
            <span class="dt-meta">${rows.length} rows</span>
        </div>
        <div class="dt-scroll"><table class="dt-scroll-table"></table></div>`;

    const table = container.querySelector('.dt-scroll-table');
    function render() {
        const q = filter.toLowerCase();
        const visible = q ? rows.filter(r => cols.some(c => ('' + (r[c.key] ?? '')).toLowerCase().includes(q))) : rows;
        table.innerHTML = `<thead><tr>${cols.map(c => `<th class="${c.sortable !== false ? 'sortable' : ''}">${c.label}</th>`).join('')}</tr></thead><tbody>${visible.map((r, i) => `<tr>${cols.map(c => `<td>${c.format ? c.format(r[c.key], r) : escHtml(String(r[c.key] ?? ''))}</td>`).join('')}</tr>`).join('')}</tbody>`;
        container.querySelector('.dt-meta').textContent = `${visible.length} / ${rows.length} rows`;
    }

    document.getElementById(searchId).addEventListener('input', e => { filter = e.target.value; render(); });
    render();
}

function dtEmpty(title, hint) {
    return `<div class="dt-empty"><div class="dt-empty-title">${title}</div>${hint ? `<div class="dt-empty-hint">${hint}</div>` : ''}</div>`;
}

/* ================================================================
   Helpers
   ================================================================ */
function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
const AVATAR_COLORS = ['indigo','emerald','amber','violet','rose','sky'];
function avatarColor(str) {
    let h = 0;
    for (let i = 0; i < (str||'').length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}
function initials(str) {
    return (str||'').split(/[-_\s.]+/).filter(Boolean).slice(0,2).map(w => w[0].toUpperCase()).join('') || '?';
}
function trunc(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }
function timeShort(iso) {
    try { return new Date(iso).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }); }
    catch { return ''; }
}
